              {
                "$ref": "#/components/schemas/VariableExtractionPlan"
              }
            ]
          },
          "parameters": {
            "description": "Static key-value pairs merged into the request body. Values support Liquid templates.",
            "type": "array",
            "items": {
              "$ref": "#/components/schemas/ToolParameter"
            }
          },
