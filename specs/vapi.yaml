          "type": {
            "type": "string",
            "description": "This is the detection type to use for voicemail detection.\n- 'audio': Uses native audio models (default)\n- 'transcript': Uses ASR/transcript-based detection\n@default 'audio' (audio detection)",
            "enum": [
              "audio",
              "transcript"
            ]
          }
        },
        "required": [
          "provider"
        ]
