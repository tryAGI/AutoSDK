      }
    },
    "schemas": {
      "FallbackTranscriberPlan": {
        "type": "object",
        "properties": {
          "transcribers": {
            "type": "array",
            "items": {
              "oneOf": [
                {
                  "$ref": "#/components/schemas/FallbackAssemblyAITranscriber",
