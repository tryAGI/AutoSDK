    "/auth/keys": {
      "post": {
        "operationId": "exchange-auth-code-for-api-key",
        "summary": "Exchange authorization code for API key",
        "description": "Exchange an authorization code from the PKCE flow for a user-controlled API key",
        "tags": [
          "subpackage_oAuth"
        ],
        "parameters": [],
        "responses": {
          "200": {
            "description": "Successfully exchanged code for an API key",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/OAuth_exchangeAuthCodeForAPIKey_Response_200"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request - Invalid request parameters or malformed input",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/BadRequestResponse"
                }
              }
            }
          },
          "403": {
            "description": "Forbidden - Authentication successful but insufficient permissions",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ForbiddenResponse"
                }
              }
            }
          },
          "500": {
            "description": "Internal Server Error - Unexpected server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/InternalServerResponse"
                }
              }
            }
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "code": {
                    "type": "string",
                    "description": "The authorization code received from the OAuth redirect"
                  },
                  "code_verifier": {
                    "type": "string",
                    "description": "The code verifier if code_challenge was used in the authorization request"
                  },
                  "code_challenge_method": {
                    "oneOf": [
                      {
                        "$ref": "#/components/schemas/AuthKeysPostRequestBodyContentApplicationJsonSchemaCodeChallengeMethod"
                      },
                      {
                        "type": "null"
                      }
                    ],
                    "description": "The method used to generate the code challenge"
                  }
                },
                "required": [
                  "code"
                ]
              }
            }
          }
        }
      }
    },
    "/auth/keys/code": {
      "post": {
        "operationId": "create-auth-keys-code",
        "summary": "Create authorization code",
        "description": "Create an authorization code for the PKCE flow to generate a user-controlled API key",
        "tags": [
          "subpackage_oAuth"
        ],
        "parameters": [],
        "responses": {
          "200": {
            "description": "Successfully created authorization code",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/OAuth_createAuthKeysCode_Response_200"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request - Invalid request parameters or malformed input",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/BadRequestResponse"
                }
              }
            }
          },
          "401": {
            "description": "Unauthorized - Authentication required or invalid credentials",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/UnauthorizedResponse"
                }
              }
            }
          },
          "409": {
            "description": "Conflict - App upsert conflict during auth code creation",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ConflictResponse"
                }
              }
            }
          },
          "500": {
            "description": "Internal Server Error - Unexpected server error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/InternalServerResponse"
                }
              }
            }
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "callback_url": {
                    "type": "string",
                    "format": "uri",
                    "description": "The callback URL to redirect to after authorization. Note, only https URLs on ports 443 and 3000 are allowed."
                  },
                  "code_challenge": {
                    "type": "string",
                    "description": "PKCE code challenge for enhanced security"
                  },
                  "code_challenge_method": {
                    "$ref": "#/components/schemas/AuthKeysCodePostRequestBodyContentApplicationJsonSchemaCodeChallengeMethod",
                    "description": "The method used to generate the code challenge"
                  },
                  "limit": {
                    "type": "number",
                    "format": "double",
                    "description": "Credit limit for the API key to be created"
                  },
                  "expires_at": {
                    "type": [
                      "string",
                      "null"
                    ],
                    "format": "date-time",
                    "description": "Optional expiration time for the API key to be created"
                  },
                  "key_label": {
                    "type": "string",
                    "description": "Optional custom label for the API key. Defaults to the app name if not provided."
                  },
                  "usage_limit_type": {
                    "$ref": "#/components/schemas/AuthKeysCodePostRequestBodyContentApplicationJsonSchemaUsageLimitType",
                    "description": "Optional credit limit reset interval. When set, the credit limit resets on this interval."
                  }
                },
                "required": [
                  "callback_url"
                ]
              }
            }
          }
        }
      }
    },
