            "name": "preserveMetadata",
            "in": "query",
            "description": "Controls which metadata from the original image will be preserved in the output image.\n\n- `never`: No metadata preservation (default)\n- `xmp`: Preserve XMP metadata including camera settings, copyright information, and other embedded metadata\n- `exifSubset`: Preserve EXIF Copyright (IFD0) and UserComment (ExifIFD) fields only.   **Deprecated** — use `exifSubsetWithXmpCompatibility` instead. Will be removed in a future release.\n- `exifSubsetWithXmpCompatibility`: Same as `exifSubset` but also writes Copyright and   UserComment as XMP fields (dc:rights / exif:UserComment) for applications that read   XMP instead of EXIF (e.g. Adobe products, macOS Preview).",
            "schema": {
              "default": "never",
              "enum": [
                "never",
                "xmp",
                "exifSubset",
                "exifSubsetWithXmpCompatibility"
              ],
              "examples": [
                "never",
                "xmp",
                "exifSubset",
                "exifSubsetWithXmpCompatibility"
              ],
              "type": "string"
            }
          },
          {
            "name": "referenceBox",
            "in": "query",
            "description": "[Advanced] `subjectBox` by default. When set to `originalImage`, the padding / margin will be around the original image and not the cropped subject.\n\nIt can lead to the subject disappearing when scaling is set to 'fill', for instance if the subject is on the left of a landscape image and outputSize is a square.\n\nMost use cases don't require this option. It is useful if you'd like to maintain subject positioning in the original image.\n\nCan't be provided if `removeBackground` is set to `false`\n\n(See positioning section of the documentation for more information)",
            "schema": {
              "default": "subjectBox",
              "enum": [
                "subjectBox",
                "originalImage"
              ],
              "examples": [
                "subjectBox",
                "originalImage"
              ],
              "type": "string"
            }
          },
          {
            "name": "removeBackground",
            "in": "query",
            "description": "If enabled (default), the background of the image will be removed using PhotoRoom's award-winning algorithm",
            "schema": {
              "default": true,
              "examples": [
                "true",
                "false"
              ],
              "type": "boolean"
            }
          },
          {
            "name": "scaling",
            "in": "query",
            "description": "Whether the subject should fit (default) or fill the output image If set to `fit`, the empty pixels will be transparent\n\nCan only be provided if `imageUrl` or `imageFile` is provided",
            "schema": {
              "default": "fit",
              "enum": [
                "fit",
                "fill"
              ],
              "examples": [
                "fit",
                "fill"
              ],
              "type": "string"
            }
          },
          {
            "name": "segmentation.mode",
            "in": "query",
            "description": "Controls whether or not the salient object should be kept or ignored by the segmentation model.",
            "schema": {
              "enum": [
                "keepSalientObject",
                "ignoreSalientObject"
              ],
              "type": "string"
            }
          },
          {
            "name": "segmentation.negativePrompt",
            "in": "query",
            "description": "A textual description of what the segmentation should remove.",
            "schema": {
              "examples": [
                "a red object"
              ],
              "type": "string"
            }
          },
          {
            "name": "segmentation.prompt",
            "in": "query",
            "description": "A textual description of what the segmentation should keep.",
            "schema": {
              "examples": [
                "a red object"
              ],
              "type": "string"
            }
          },
          {
            "name": "shadow.mode",
            "in": "query",
            "description": "Shadow generation mode to use on the main image used by the API. If set to `ai.soft`, a soft shadow will be generated If set to `ai.hard`, a hard shadow will be generated If set to `ai.floating`, a floating shadow will be generated",
            "schema": {
              "enum": [
                "ai.soft",
                "ai.hard",
                "ai.floating"
              ],
              "examples": [
                "ai.soft",
                "ai.hard",
                "ai.floating"
              ],
              "type": "string"
            }
          },
          {
            "name": "templateId",
            "in": "query",
            "description": "The ID of the template to render",
            "schema": {
              "format": "uuid",
              "type": "string"
            }
          },
          {
            "name": "textRemoval.mode",
            "in": "query",
            "description": "Text removal mode to use on the main image used by the API.\n\nIf set to `ai.artificial`, artificial text will be automatically removed. Artificial text includes all text added on an image through post-precessing, such as company name, watermarks, discount, etc.\n\nIf set to `ai.natural`, natural text will be automatically removed. Natural text includes text that naturally occurs in an image such as writing on buildings or clothings, road signs, etc.\n\nIf set to `ai.all`, all text (natural and artificial) will be automatically removed.",
            "schema": {
              "enum": [
                "ai.artificial",
                "ai.natural",
                "ai.all"
              ],
              "examples": [
                "ai.artificial",
                "ai.natural",
                "ai.all"
              ],
              "type": "string"
            }
          },
          {
            "name": "uncrop.mode",
            "in": "query",
            "description": "Uncrop mode to use on the main image used by the API.\n\nCurrently, only `ai.auto` is supported. With `ai.auto`, the subject will be automatically detected and uncropped.",
            "schema": {
              "const": "ai.auto",
              "examples": [
                "ai.auto"
              ],
              "type": "string"
            }
          },
          {
            "name": "uncrop.seed",
            "in": "query",
            "description": "Seed used to generate the background. Can be used to get similar looking results for the same prompt.",
            "schema": {
              "examples": [
                "123456"
              ],
              "type": "number"
            }
          },
          {
            "name": "upscale.mode",
            "in": "query",
            "description": "(ALPHA) Warning: might get deprecated with a 2 weeks warning\n\nIf enabled, the input image will be upscaled (imageFile or imageUrl)\n\nThe input image (imageFile or imageUrl) must not exceed 1000x1000 pixels in dimensions when using `ai.fast` mode. The input image (imageFile or imageUrl) must not exceed 512x512 pixels in dimensions when using `ai.slow` mode.\n\nThe upscaling process will enlarge the input image up to 4 times its original size. This will significantly increase the resolution and affect both the input processing and the final output dimensions.\n\nai.fast: This algorithm is optimized for speed and may not produce the highest quality results. ai.slow: This algorithm is optimized for quality and may take more time to process.",
            "schema": {
              "enum": [
                "ai.fast",
                "ai.slow"
              ],
              "examples": [
                "ai.fast",
                "ai.slow"
              ],
              "type": "string"
            }
          },
          {
            "name": "verticalAlignment",
            "in": "query",
            "description": "[Advanced] Defines the vertical alignment of the cutout subject within its bounding box.\n\nSpecifying a custom vertical alignment will implicitly set `ignorePaddingAndSnapOnCroppedSides` to `false` for the vertical direction.",
            "schema": {
              "enum": [
                "top",
                "center",
                "bottom"
              ],
              "examples": [
                "top",
                "center",
                "bottom"
              ],
              "type": "string"
            }
          },
          {
            "name": "virtualModel.additionalProductImages",
            "in": "query",
            "description": "Additional product images showing different angles or details of the same item. These help the model better understand the product and generate more accurate results.",
            "schema": {
              "type": "array",
              "items": {
                "type": "string"
              },
              "minItems": 1,
              "maxItems": 4,
              "description": "URLs of additional product images showing different angles or details."
            }
          },
          {
            "name": "virtualModel.mode",
            "in": "query",
            "description": "Must be set to `ai.auto` to enable virtual model generation.",
            "schema": {
              "const": "ai.auto",
              "examples": [
                "ai.auto"
              ],
              "type": "string"
            }
          },
          {
            "name": "virtualModel.model",
            "in": "query",
            "description": "The model (person) to use for the virtual try-on. Either a preset model name or a custom image.",
            "schema": {
              "anyOf": [
                {
                  "additionalProperties": false,
                  "properties": {
                    "preset": {
                      "additionalProperties": false,
                      "description": "Use a preset model by name.",
                      "properties": {
                        "name": {
                          "description": "Name of the preset model.",
                          "enum": [
                            "avery",
                            "sam",
                            "taylor",
                            "kendall",
                            "jordan",
                            "casey",
                            "alex",
                            "maya",
                            "reece",
                            "lena",
                            "julia",
                            "jackson",
                            "sophia",
                            "emma",
                            "ava",
                            "zoe",
                            "fiona"
                          ],
                          "examples": [
                            "avery",
                            "jordan",
                            "sophia"
                          ],
                          "type": "string"
                        }
                      },
                      "required": [
                        "name"
                      ],
                      "type": "object"
                    }
                  },
                  "required": [
                    "preset"
                  ],
                  "type": "object"
                },
                {
                  "additionalProperties": false,
                  "properties": {
                    "custom": {
                      "additionalProperties": false,
                      "description": "Use a custom model image.",
                      "properties": {
                        "imageFile": {
                          "description": "Bytes of a custom model image. Only available in the POST request.",
                          "format": "binary",
                          "type": "string"
                        },
                        "imageUrl": {
                          "description": "URL of a custom model image.",
                          "examples": [
                            "https://example.com/model.jpg"
                          ],
                          "type": "string"
                        }
                      },
                      "type": "object"
                    }
                  },
                  "required": [
                    "custom"
                  ],
                  "type": "object"
                }
              ],
              "default": {
                "preset": {
                  "name": "avery"
                }
              }
            }
          },
          {
            "name": "virtualModel.pose",
            "in": "query",
            "description": "The pose of the model in the generated image.",
            "schema": {
              "default": "random",
              "enum": [
                "random",
                "standing",
                "34turn",
                "powerstance",
                "walkingforward",
                "handinpocket",
                "crossedarms",
                "back",
                "overtheshoulder",
                "seated",
                "adjustingclothing",
                "playfulspin"
              ],
              "examples": [
                "standing",
                "34turn",
                "overtheshoulder",
                "seated"
              ],
              "type": "string"
            }
          },
          {
            "name": "virtualModel.prompt",
            "in": "query",
            "description": "Optional text prompt to guide the generation style.",
            "schema": {
              "examples": [
                "street style",
                "studio look",
                "casual outdoor"
              ],
              "type": "string"
            }
          },
          {
            "name": "virtualModel.quality",
            "in": "query",
            "description": "The output quality of the generated image. Higher quality produces larger images. `standard` outputs ~1K, `advanced` ~2K, and `premium` ~4K resolution.",
            "schema": {
              "default": "standard",
              "enum": [
                "standard",
                "advanced",
                "premium"
              ],
              "examples": [
                "standard",
                "advanced",
                "premium"
              ],
              "type": "string"
            }
          },
          {
            "name": "virtualModel.scene",
            "in": "query",
            "description": "The scene (background/environment) to use. Either a preset scene name or a custom image.",
            "schema": {
              "anyOf": [
                {
                  "additionalProperties": false,
                  "properties": {
                    "preset": {
                      "additionalProperties": false,
                      "description": "Use a preset scene by name.",
                      "properties": {
                        "name": {
                          "description": "Name of the preset scene.",
                          "enum": [
                            "random",
                            "street",
                            "bedroom",
                            "sunset",
                            "factory",
                            "studio",
                            "coloredstudio",
                            "concretestudio",
                            "beach",
                            "tropical",
                            "library",
                            "forest",
                            "businessdistrict",
                            "countryside",
                            "flowers",
                            "goldenlight",
                            "mountain",
                            "pool",
                            "latincity",
                            "cafe",
                            "asiancity",
                            "nightlights",
                            "desert"
                          ],
                          "examples": [
                            "street",
                            "studio",
                            "beach"
                          ],
                          "type": "string"
                        }
                      },
                      "required": [
                        "name"
                      ],
                      "type": "object"
                    }
                  },
                  "required": [
                    "preset"
                  ],
                  "type": "object"
                },
                {
                  "additionalProperties": false,
                  "properties": {
                    "custom": {
                      "additionalProperties": false,
                      "description": "Use a custom scene image.",
                      "properties": {
                        "imageFile": {
                          "description": "Bytes of a custom scene image. Only available in the POST request.",
                          "format": "binary",
                          "type": "string"
                        },
                        "imageUrl": {
                          "description": "URL of a custom scene image.",
                          "examples": [
                            "https://example.com/scene.jpg"
                          ],
                          "type": "string"
                        }
                      },
                      "type": "object"
                    }
                  },
                  "required": [
                    "custom"
                  ],
                  "type": "object"
                }
              ],
              "default": {
                "preset": {
                  "name": "random"
                }
              }
            }
          },
          {
            "name": "virtualModel.size",
            "in": "query",
            "description": "The output size of the generated image.",
            "schema": {
              "default": "PORTRAIT_HD_3_2",
              "examples": [
                "SQUARE_HD",
                "PORTRAIT_HD_4_3",
                "LANDSCAPE_HD_16_9"
              ],
              "enum": [
                "PORTRAIT_HD_16_9",
                "PORTRAIT_HD_4_3",
                "PORTRAIT_HD_3_2",
                "SQUARE_HD",
                "LANDSCAPE_HD_3_2",
                "LANDSCAPE_HD_4_3",
                "LANDSCAPE_HD_16_9"
              ],
              "type": "string"
            }
          }
        ],
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "image/png": {
                "schema": {
                  "$ref": "#/components/schemas/image-response"
                }
              }
            },
            "headers": {
              "x-uncertainty-score": {
                "schema": {
                  "summary": "The uncertainty score of the cutout",
                  "description": "The uncertainty score is a number between 0 and 1. 0 means the model is very confident that the cutout is accurate, 1 means the model is unsure. For instance, shoes on a shoe box might give a higher uncertainty score as the model is unsure what to segment (shoes, box or both). Currently the model returns an uncertainty score only for images of objects. If an image contains humans, it will return the value -1."
                }
              },
              "pr-ai-background-seed": {
                "schema": {
                  "summary": "The seed used when generating the background",
                  "description": "This is the seed used when generating the background. Can be used to get similar looking results for the same prompt."
                }
              },
              "pr-texts-detected": {
                "schema": {
                  "summary": "The number of texts detected in the image",
                  "description": "When removing texts from an image, it will return the number of texts detected."
                }
              },
              "pr-unsupported-attributes": {
                "schema": {
                  "summary": "Unsupported Attributes (example: pr-unsupported-attributes='Unsupported attributes: background.inner')",
                  "description": "[Temporary] If the request contains attributes that are not supported by the API, this header will be returned with a list of the unsupported attributes. Soon to be replaced by a 400 Bad Request response."
                }
              },
              "pr-edit-further-url": {
                "schema": {
                  "summary": "A URL to open the result of the API call in the Photoroom webapp and edit it further",
                  "description": "If you're not fully satisfied with the result returned by the Image Editing API, it's possible to open the result image inside the Photoroom Web App, where you'll be able to adjust the result"
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/edit-image-bad-request"
                }
              }
            }
          },
          "402": {
            "description": "Payment Required",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/payment-error"
                }
              }
            }
          },
          "500": {
            "description": "Internal Server Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/unknown-error"
                }
              }
            }
          }
        }
      },
      "post": {
        "operationId": "edit-image-post",
        "summary": "Image Editing v2 (Plus plan)",
        "description": "This endpoint processes an image and applies one or more edits: background removal, AI-generated backgrounds (background.prompt), realistic shadows (shadow.mode), relighting (lighting.mode), text removal (textRemoval.mode), background blur (background.blur.*), subject outline (outline.*), AI beautification (beautify.mode), Flat Lay (flatLay.*), Ghost Mannequin (ghostMannequin.*), Virtual Model (virtualModel.*), AI expand (expand.mode), AI uncrop (uncrop.mode), AI upscale (upscale.mode), and positioning/resizing (padding, margin, outputSize).\n\nParameters are grouped by feature using dot notation: background.* for backgrounds, shadow.* for shadows, lighting.* for relighting, outline.* for subject outlines, beautify.* for AI beautification, flatLay.* for flat lay generation, ghostMannequin.* for ghost mannequin generation, virtualModel.* for virtual model generation, expand.* for AI expand, uncrop.* for AI uncrop, upscale.* for AI upscale, export.* for output format, and segmentation.* for text-guided segmentation.\n\nEdits can be combined in a single call.\n\nIt accepts an image file for the image. If you want to send a URL, please use the GET endpoint. For more details on the difference between the GET and POST endpoints, please have a look at our documentation: https://docs.photoroom.com/image-editing-api/which-endpoints-are-available.\n\nIf you only have a URL for your image (not a local file), use the GET endpoint instead — it is simpler to integrate. Use this POST endpoint when you need to upload image files directly as multipart/form-data.\n\nFull documentation: https://docs.photoroom.com/image-editing-api-plus-plan/quickstart-guide\n\nFeature documentation:\n- [HD Background Removal](https://docs.photoroom.com/image-editing-api-plus-plan/hd-background-removal)\n- [Positioning (padding, margin, scaling)](https://docs.photoroom.com/image-editing-api-plus-plan/positioning)\n- [Output Size](https://docs.photoroom.com/image-editing-api-plus-plan/output-size)\n- [Static Background](https://docs.photoroom.com/image-editing-api-plus-plan/static-background)\n- [Background Blur](https://docs.photoroom.com/image-editing-api-plus-plan/background-blur)\n- [Subject Outline](https://docs.photoroom.com/image-editing-api-plus-plan/subject-outline)\n- [AI Shadows](https://docs.photoroom.com/image-editing-api-plus-plan/ai-shadows)\n- [AI Backgrounds](https://docs.photoroom.com/image-editing-api-plus-plan/ai-backgrounds)\n- [AI Relight](https://docs.photoroom.com/image-editing-api-plus-plan/ai-relight)\n- [AI Text Removal](https://docs.photoroom.com/image-editing-api-plus-plan/ai-text-removal)\n- [AI Expand](https://docs.photoroom.com/image-editing-api-plus-plan/ai-expand)\n- [AI Uncrop](https://docs.photoroom.com/image-editing-api-plus-plan/ai-uncrop)\n- [AI Beautifier](https://docs.photoroom.com/image-editing-api-plus-plan/ai-beautifier)\n- [Flat Lay](https://docs.photoroom.com/image-editing-api-plus-plan/flat-lay)\n- [Ghost Mannequin](https://docs.photoroom.com/image-editing-api-plus-plan/ghost-mannequin)\n- [Virtual Model](https://docs.photoroom.com/image-editing-api-plus-plan/virtual-model)\n- [AI Upscale](https://docs.photoroom.com/image-editing-api-plus-plan/alpha-ai-upscale)\n- [Describe Any Change](https://docs.photoroom.com/image-editing-api-plus-plan/edit-with-ai)\n- [Create Any Image](https://docs.photoroom.com/image-editing-api-plus-plan/alpha-create-any-image)\n- [Text-Guided Segmentation](https://docs.photoroom.com/image-editing-api-plus-plan/alpha-text-guided-segmentation)\n- [Sandbox Mode (free testing)](https://docs.photoroom.com/image-editing-api-plus-plan/sandbox-mode)",
        "servers": [
          {
            "url": "https://image-api.photoroom.com",
            "description": "Production server (Plus plan)"
          }
        ],
        "requestBody": {
          "content": {
            "multipart/form-data": {
              "schema": {
                "type": "object",
                "properties": {
                  "background.blur.mode": {
                    "type": "string",
                    "description": "Type of blur to apply to the background.\n- `gaussian`: Applies a gaussian blur to the background.\n- `bokeh`: Applies a bokeh blur to the background."
                  },
                  "background.blur.radius": {
                    "type": "number",
                    "description": "Radius of the blur effect. Higher values mean the result will be blurrier.\n\nMinimum: 0, Maximum: 0.05"
                  },
                  "background.color": {
                    "type": "string",
                    "description": "Color of the background. If omitted, background will be transparent unless `background.imageUrl` or `background.imageFile` is provided. Can be a hex color without the hash sign (example: `FF0000`, `FF0000EE`) or color name (examples: `red`, `blue`)\n\nWhen `removeBackground` is set to `false`, the color will be used to fill padding areas created by `outputSize` and any transparent areas in the original image."
                  },
                  "background.expandPrompt": {
                    "description": "If `ai.auto`, a pre-processing step is applied to expand the prompt into a longer form.\n\n`auto` and `never` are legacy values that will be removed in the next major version."
                  },
                  "background.guidance.imageFile": {
                    "type": "string",
                    "format": "binary",
                    "description": "Bytes of the image to use as a background image guidance. Only available in the POST request\n\nCan't be provided if `removeBackground` is set to `false`\n\nThe maximum size of the image is 30MB."
                  },
                  "background.guidance.scale": {
                    "type": "number",
                    "description": "How closely the generated background will be matching the guiding image, between 0 and 1.\n\nA value of 1 means it will match the guiding image as much as possible, a value of 0 means the guiding image will be ignored.\n\n(Only working when using the [new model](https://docs.photoroom.com/image-editing-api-plus-plan/ai-backgrounds#important-model-selection))"
                  },
                  "background.imageFile": {
                    "type": "string",
                    "format": "binary",
                    "description": "Bytes of the image to use as a background. Only available in the POST request\n\nCan't be provided if `removeBackground` is set to `false`\n\nThe maximum size of the image is 30MB.\n\nIf `background.imageFile` is provided, neither `background.imageUrl` nor `background.prompt` can be provided, and vice versa."
                  },
                  "background.negativePrompt": {
                    "type": "string",
                    "description": "(LEGACY) This parameter will only have an effect when using the previous AI Backgrounds model, which is used when setting the header: `pr-ai-background-model-version: 2`\n\nA negative prompt to use for guiding the background generation process; If provided, the generation algorithm will try to avoid properties listed in the negativePrompt."
                  },
                  "background.prompt": {
                    "type": "string",
                    "description": "Prompt to use for guiding the background generation process.\n\nTips for writing high-quality prompts are available [in our documentation](https://docs.photoroom.com/image-editing-api-plus-plan/ai-backgrounds#how-to-write-a-high-quality-prompt).\n\nIf `background.prompt` is provided, neither `background.imageUrl` nor `background.imageFile` can be provided, and vice versa."
                  },
                  "background.scaling": {
                    "type": "string",
                    "description": "Whether the background should fit or fill (default) the output image If set to `fit`, the empty pixels will be transparent\n\nCan only be provided if `background.imageUrl` or `background.imageFile` is provided"
                  },
                  "background.seed": {
                    "type": "number",
                    "description": "Seed used to generate the background. Can be used to get similar looking results for the same prompt."
                  },
                  "beautify.mode": {
                    "type": "string",
                    "description": "If enabled, the input image will be beautified (imageFile or imageUrl).\n\nThis is intended to enhance product images by automatically improving the aesthetics of the image, such as the lighting, background, and overall appearance.\n\nIf set to `ai.auto`, the input image will be beautified to match the aesthetic of a packshot product image.\n\nIf set to `ai.food`, the input image will be beautified in a way that's specific to food images, such as placing the subject on a plate.\n\nIf set to `ai.car`, the input image will be beautified in a way that's specific to car images, such as removing reflections.\n\nImportant:\n- the beautifier will not preserve the original background: we recommend using this option along with `removeBackground` set to `true`\n- the beautifier is meant for images of products, food, or cars; we do not recommend using it with subjects such as humans, pets, etc."
                  },
                  "beautify.seed": {
                    "type": "number",
                    "description": "Seed used to run the subject beautifier. Can be used to get similar looking results for the same subject."
                  },
                  "describeAnyChange.mode": {
                    "type": "string",
                    "description": "(DEPRECATED) Use `editWithAI.mode` instead.\n\nDescribe any change mode to use on the main image used by the API.\n\nCurrently, only `ai.auto` is supported."
                  },
                  "describeAnyChange.prompt": {
                    "type": "string",
                    "description": "(DEPRECATED) Use `editWithAI.prompt` instead.\n\nThe natural language prompt describing the change to apply to the image."
                  },
                  "describeAnyChange.seed": {
                    "type": "number",
                    "description": "(DEPRECATED) Use `editWithAI.seed` instead.\n\nSeed used for the generation. Can be used to get similar looking results for the same prompt."
                  },
                  "editWithAI.mode": {
                    "type": "string",
                    "description": "Edit with AI mode to use on the main image used by the API.\n\nCurrently, only `ai.auto` is supported."
                  },
                  "editWithAI.prompt": {
                    "type": "string",
                    "description": "The natural language prompt describing the change to apply to the image."
                  },
                  "editWithAI.seed": {
                    "type": "number",
                    "description": "Seed used for the generation. Can be used to get similar looking results for the same prompt."
                  },
                  "expand.mode": {
                    "type": "string",
                    "description": "Expand mode to use on the main image used by the API.\n\nIf set to `ai.auto`, all transparent pixels will automatically be filled based on the content of the current background (either the original background, if `removeBackground` has been set to `false`, or a static background, if `background.imageUrl` has been provided)\n\nExpand will rely on output size, subject position, and fitting mode."
                  },
                  "expand.seed": {
                    "type": "number",
                    "description": "Seed used to generate the background. Can be used to get similar looking results for the same prompt."
                  },
                  "export.dpi": {
                    "type": "number",
                    "description": "The pixel density of the result image.\n\nPixel density can be set to any value between 72 and 1200 dpi."
                  },
                  "export.format": {
                    "type": "string",
                    "description": "The format of the result image.\n\nDefault value is \"png\".\n\nJpeg exports with a quality of 80 and WebP exports with a quality of 90."
                  },
                  "flatLay.mode": {
                    "type": "string",
                    "description": "Must be set to `ai.auto` to enable flat lay generation."
                  },
                  "flatLay.prompt": {
                    "type": "string",
                    "description": "Optional text prompt to guide the generation style."
                  },
                  "flatLay.size": {
                    "type": "string",
                    "description": "The output size of the generated image."
                  },
                  "ghostMannequin.mode": {
                    "type": "string",
                    "description": "Must be set to `ai.auto` to enable ghost mannequin generation."
                  },
                  "ghostMannequin.prompt": {
                    "type": "string",
                    "description": "Optional text prompt to guide the generation style."
                  },
                  "ghostMannequin.size": {
                    "type": "string",
                    "description": "The output size of the generated image."
                  },
                  "horizontalAlignment": {
                    "type": "string",
                    "description": "[Advanced] Defines the horizontal alignment of the cutout subject within its bounding box.\n\nSpecifying a custom horizontal alignment will implicitly set `ignorePaddingAndSnapOnCroppedSides` to `false` for the horizontal direction."
                  },
                  "ignorePaddingAndSnapOnCroppedSides": {
                    "type": "boolean",
                    "description": "If set to `true` (default), cropped sides of the subject will snap to the edges For instance, for a portrait image cropped below the elbows, the subject will be aligned at the bottom even if a bottom padding is provided (but it will still respect bottom margin)\n\nCan't be provided if `removeBackground` is set to `false`\n\n(See positioning section of the documentation for more information)"
                  },
                  "imageFile": {
                    "type": "string",
                    "format": "binary",
                    "description": "Bytes of the main image used by the API. The POST endpoint accepts `imageFile` only.\n\nThe maximum size of the image is 30MB.\n\nIf you want to send the URL of an image, please instead use the GET endpoint with the argument `imageUrl`."
                  },
                  "imageFromPrompt.prompt": {
                    "type": "string",
                    "description": "The prompt to use for generating the image."
                  },
                  "imageFromPrompt.seed": {
                    "type": "number",
                    "description": "Seed used to run the AI image generator. Can be used to get similar looking results for the same prompt."
                  },
                  "imageFromPrompt.size": {
                    "type": "string",
                    "description": "Supported sizes for AI image generation"
                  },
                  "keepExistingAlphaChannel": {
                    "type": "string",
                    "description": "If set to `auto` and if the image has transparency, the existing transparency will be used to cutout the subject."
                  },
                  "layers": {
                    "type": "object"
                  },
                  "lighting.mode": {
                    "type": "string",
                    "description": "Lighting mode to use on the main image used by the API.\n\nIf set to `ai.auto`, the lighting will be automatically adjusted\n\nIf set to `ai.preserve-hue-and-saturation`, the lighting will be adjusted while keeping color hues and saturations as close as possible to the original image"
                  },
                  "margin": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "General margin around the subject. Can be expressed as a number between 0 and 0.49, a percentage string between 0% and 49% (e.g., \"30%\"), or a pixel value string (e.g., \"100px\"). Unlike `padding`, margin is never ignored even on cropped sides of the subject. Expressed in a ratio of the output image size. See positioning section of the documentation for more information.\n\nTips to assist with positioning are available [in our documentation](https://docs.photoroom.com/image-editing-api-plus-plan/positioning)."
                  },
                  "marginBottom": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Bottom Margin, overrides general margin on the bottom side. Accepts the same formats as `margin`."
                  },
                  "marginLeft": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Left Margin, overrides general margin on the left side. Accepts the same formats as `margin`."
                  },
                  "marginRight": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Right Margin, overrides general margin on the right side. Accepts the same formats as `margin`."
                  },
                  "marginTop": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Top Margin, overrides general margin on the top side. Accepts the same formats as `margin`."
                  },
                  "maxHeight": {
                    "type": "number",
                    "description": "Maximum output height. Can only be provided if `outputSize` is `originalImage` or `croppedSubject`. Useful for: redimensioning while keeping the aspect ratio"
                  },
                  "maxWidth": {
                    "type": "number",
                    "description": "Maximum output width. Can only be provided if `outputSize` is `originalImage` or `croppedSubject`. Useful for: resizing an image while keeping the aspect ratio"
                  },
                  "outline.blurRadius": {
                    "type": "number",
                    "description": "Blur radius for the outline, creating a glow or soft edge effect. Higher values mean the outline will be more blurred, 0 means no blur.\n\nMinimum: 0, Maximum: 0.025"
                  },
                  "outline.color": {
                    "type": "string",
                    "description": "Apply a colored outline around the subject to highlight it. Can be a hex color without the hash sign (example: `FF0000`, `FF0000EE`) or color name (examples: `red`, `blue`)"
                  },
                  "outline.width": {
                    "type": "number",
                    "description": "Width of the outline relative to the image size. Suggested values:\n- 0.01-0.02: Subtle/thin outline\n- 0.03-0.05: Standard/medium outline (default: 0.03)\n- 0.06-0.1: Bold/thick outline The value represents a ratio where 0.1 (10%) is the maximum thickness.\n\nMinimum: 0, Maximum: 0.1"
                  },
                  "outputSize": {
                    "type": "string",
                    "description": "Output size of the image. In the form of either:\n- `auto` to keep the template dimensions when templateId is defined, or behave like `originalImage` when templateId isn't defined (default)\n- `widthxheight` for a custom size (example: `200x400`)\n- `originalImage` to keep the original image dimensions\n- `croppedSubject` to use the size of the foreground dimensions after cropping around it"
                  },
                  "padding": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "General padding around the subject. Can be expressed as a number between 0 and 0.49, a percentage string between 0% and 49% (e.g., \"30%\"), or a pixel value string (e.g., \"100px\"). Unlike `margin`, padding will be ignored on cropped sides of the subject if that option is enabled. Expressed in a ratio of the size of the document, minus margins (similar to CSS). See positioning section of the documentation for more information.\n\nTips to assist with positioning are available [in our documentation](https://docs.photoroom.com/image-editing-api-plus-plan/positioning)."
                  },
                  "paddingBottom": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Bottom padding, overrides general padding on the bottom side. Accepts the same formats as `padding`."
                  },
                  "paddingLeft": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Left padding, overrides general padding on the left side. Accepts the same formats as `padding`."
                  },
                  "paddingRight": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Right padding, overrides general padding on the right side. Accepts the same formats as `padding`."
                  },
                  "paddingTop": {
                    "type": [
                      "number",
                      "string"
                    ],
                    "description": "Top padding, overrides general padding on the top side. Accepts the same formats as `padding`."
                  },
                  "preserveMetadata": {
                    "type": "string",
                    "description": "Controls which metadata from the original image will be preserved in the output image.\n\n- `never`: No metadata preservation (default)\n- `xmp`: Preserve XMP metadata including camera settings, copyright information, and other embedded metadata\n- `exifSubset`: Preserve EXIF Copyright (IFD0) and UserComment (ExifIFD) fields only.   **Deprecated** — use `exifSubsetWithXmpCompatibility` instead. Will be removed in a future release.\n- `exifSubsetWithXmpCompatibility`: Same as `exifSubset` but also writes Copyright and   UserComment as XMP fields (dc:rights / exif:UserComment) for applications that read   XMP instead of EXIF (e.g. Adobe products, macOS Preview)."
                  },
                  "referenceBox": {
                    "type": "string",
                    "description": "[Advanced] `subjectBox` by default. When set to `originalImage`, the padding / margin will be around the original image and not the cropped subject.\n\nIt can lead to the subject disappearing when scaling is set to 'fill', for instance if the subject is on the left of a landscape image and outputSize is a square.\n\nMost use cases don't require this option. It is useful if you'd like to maintain subject positioning in the original image.\n\nCan't be provided if `removeBackground` is set to `false`\n\n(See positioning section of the documentation for more information)"
                  },
                  "removeBackground": {
                    "type": "boolean",
                    "description": "If enabled (default), the background of the image will be removed using PhotoRoom's award-winning algorithm"
                  },
                  "scaling": {
                    "type": "string",
                    "description": "Whether the subject should fit (default) or fill the output image If set to `fit`, the empty pixels will be transparent\n\nCan only be provided if `imageUrl` or `imageFile` is provided"
                  },
                  "segmentation.mode": {
                    "type": "string",
                    "description": "Controls whether or not the salient object should be kept or ignored by the segmentation model."
                  },
                  "segmentation.negativePrompt": {
                    "type": "string",
                    "description": "A textual description of what the segmentation should remove."
                  },
                  "segmentation.prompt": {
                    "type": "string",
                    "description": "A textual description of what the segmentation should keep."
                  },
                  "shadow.mode": {
                    "type": "string",
                    "description": "Shadow generation mode to use on the main image used by the API. If set to `ai.soft`, a soft shadow will be generated If set to `ai.hard`, a hard shadow will be generated If set to `ai.floating`, a floating shadow will be generated"
                  },
                  "templateId": {
                    "type": "string",
                    "format": "uuid",
                    "description": "The ID of the template to render"
                  },
                  "textRemoval.mode": {
                    "type": "string",
                    "description": "Text removal mode to use on the main image used by the API.\n\nIf set to `ai.artificial`, artificial text will be automatically removed. Artificial text includes all text added on an image through post-precessing, such as company name, watermarks, discount, etc.\n\nIf set to `ai.natural`, natural text will be automatically removed. Natural text includes text that naturally occurs in an image such as writing on buildings or clothings, road signs, etc.\n\nIf set to `ai.all`, all text (natural and artificial) will be automatically removed."
                  },
                  "uncrop.mode": {
                    "type": "string",
                    "description": "Uncrop mode to use on the main image used by the API.\n\nCurrently, only `ai.auto` is supported. With `ai.auto`, the subject will be automatically detected and uncropped."
                  },
                  "uncrop.seed": {
                    "type": "number",
                    "description": "Seed used to generate the background. Can be used to get similar looking results for the same prompt."
                  },
                  "upscale.mode": {
                    "type": "string",
                    "description": "(ALPHA) Warning: might get deprecated with a 2 weeks warning\n\nIf enabled, the input image will be upscaled (imageFile or imageUrl)\n\nThe input image (imageFile or imageUrl) must not exceed 1000x1000 pixels in dimensions when using `ai.fast` mode. The input image (imageFile or imageUrl) must not exceed 512x512 pixels in dimensions when using `ai.slow` mode.\n\nThe upscaling process will enlarge the input image up to 4 times its original size. This will significantly increase the resolution and affect both the input processing and the final output dimensions.\n\nai.fast: This algorithm is optimized for speed and may not produce the highest quality results. ai.slow: This algorithm is optimized for quality and may take more time to process."
                  },
                  "verticalAlignment": {
                    "type": "string",
                    "description": "[Advanced] Defines the vertical alignment of the cutout subject within its bounding box.\n\nSpecifying a custom vertical alignment will implicitly set `ignorePaddingAndSnapOnCroppedSides` to `false` for the vertical direction."
                  },
                  "virtualModel.additionalProductImages": {
                    "type": "array",
                    "description": "Additional product images showing different angles or details of the same item. These help the model better understand the product and generate more accurate results."
                  },
                  "virtualModel.mode": {
                    "type": "string",
                    "description": "Must be set to `ai.auto` to enable virtual model generation."
                  },
                  "virtualModel.model": {
                    "description": "The model (person) to use for the virtual try-on. Either a preset model name or a custom image."
                  },
                  "virtualModel.pose": {
                    "type": "string",
                    "description": "The pose of the model in the generated image."
                  },
                  "virtualModel.prompt": {
                    "type": "string",
                    "description": "Optional text prompt to guide the generation style."
                  },
                  "virtualModel.quality": {
                    "type": "string",
                    "description": "The output quality of the generated image. Higher quality produces larger images. `standard` outputs ~1K, `advanced` ~2K, and `premium` ~4K resolution."
                  },
                  "virtualModel.scene": {
                    "description": "The scene (background/environment) to use. Either a preset scene name or a custom image."
                  },
                  "virtualModel.size": {
                    "type": "string",
                    "description": "The output size of the generated image."
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "OK",
            "content": {
              "image/png": {
                "schema": {
                  "$ref": "#/components/schemas/image-response"
                }
              }
            },
            "headers": {
              "x-uncertainty-score": {
                "schema": {
                  "summary": "The uncertainty score of the cutout",
                  "description": "The uncertainty score is a number between 0 and 1. 0 means the model is very confident that the cutout is accurate, 1 means the model is unsure. For instance, shoes on a shoe box might give a higher uncertainty score as the model is unsure what to segment (shoes, box or both). Currently the model returns an uncertainty score only for images of objects. If an image contains humans, it will return the value -1."
                }
              },
              "pr-ai-background-seed": {
                "schema": {
                  "summary": "The seed used when generating the background",
                  "description": "This is the seed used when generating the background. Can be used to get similar looking results for the same prompt."
                }
              },
              "pr-texts-detected": {
                "schema": {
                  "summary": "The number of texts detected in the image",
                  "description": "When removing texts from an image, it will return the number of texts detected."
                }
              },
              "pr-unsupported-attributes": {
                "schema": {
                  "summary": "Unsupported Attributes (example: pr-unsupported-attributes='Unsupported attributes: background.inner')",
                  "description": "[Temporary] If the request contains attributes that are not supported by the API, this header will be returned with a list of the unsupported attributes. Soon to be replaced by a 400 Bad Request response."
                }
              }
            }
          },
          "400": {
            "description": "Bad Request",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/edit-image-bad-request"
                }
              }
            }
          },
          "402": {
            "description": "Payment Required",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/payment-error"
                }
              }
            }
          },
          "500": {
            "description": "Internal Server Error",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/unknown-error"
                }
              }
            }
          }
        }
      }
    },
