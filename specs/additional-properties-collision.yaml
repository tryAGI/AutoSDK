openapi: "3.0.0"
info:
  version: 1.0.0
  title: AdditionalProperties Collision Test
servers:
  - url: http://example.com/v1
paths:
  /items:
    get:
      summary: List items
      operationId: listItems
      tags:
        - items
      responses:
        '200':
          description: A list of items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Item"
components:
  schemas:
    Item:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        additionalProperties:
          type: string
          description: A user-defined property that collides with JsonExtensionData
