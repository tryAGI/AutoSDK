        "responses": {
          "200": {
            "description": "Info response",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/InfoResponse" } } }
          },
          "500": {
            "description": "Info failed",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/ErrorResponse" } } }
          }
        },
        "security": [{ "ApiKeyAuth": [] }]
      }
    },
    "/v1/files": {
      "post": {
        "tags": ["files"],
        "summary": "Upload file",
        "description": "Upload a new file.\n\nArgs:\n    file: The file to upload.\n\nReturns:\n    FileResponse: The response containing the details of the uploaded file.",
        "operationId": "create_file",
        "security": [{ "ApiKeyAuth": [] }],
        "requestBody": {
          "required": true,
          "content": {
            "multipart/form-data": { "schema": { "$ref": "#/components/schemas/Body_create_file" } }
          }
        },
        "responses": {
          "201": {
            "description": "The uploaded file details",
            "content": { "application/json": { "schema": { "$ref": "#/components/schemas/FileObject" } } }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": { "schema": { "$ref": "#/components/schemas/HTTPValidationError" } }
            }
          }
        }
      },
      "get": {
        "tags": ["files"],
        "summary": "List files",
        "description": "List all files for the authenticated user.\n\nArgs:\n    pagination: The pagination options\n\nReturns:\n    A list of files belonging to the user.",
        "operationId": "list_files",
        "security": [{ "ApiKeyAuth": [] }],
        "parameters": [
          {
            "name": "limit",
            "in": "query",
            "required": false,
            "schema": {
              "type": "integer",
              "maximum": 100,
              "minimum": 1,
              "description": "Maximum number of items to return per page (1-100)",
              "examples": [10, 20, 50],
              "default": 20,
              "title": "Limit"
            },
            "description": "Maximum number of items to return per page (1-100)"
          },
          {
            "name": "after",
            "in": "query",
            "required": false,
            "schema": {
              "anyOf": [{ "type": "string" }, { "type": "null" }],
              "description": "Cursor for forward pagination - get items after this position. Use last_cursor from previous response.",
              "examples": ["eyJjcmVhdGVkX2F0IjoiMjAyNC0xMi0zMVQyMzo1OTo1OS4wMDBaIiwiaWQiOiJhYmMxMjMifQ=="],
              "title": "After"
            },
            "description": "Cursor for forward pagination - get items after this position. Use last_cursor from previous response."
          },
          {
            "name": "before",
            "in": "query",
            "required": false,
            "schema": {
              "anyOf": [{ "type": "string" }, { "type": "null" }],
              "description": "Cursor for backward pagination - get items before this position. Use first_cursor from previous response.",
              "examples": ["eyJjcmVhdGVkX2F0IjoiMjAyNC0xMi0zMVQyMzo1OTo1OS4wMDBaIiwiaWQiOiJhYmMxMjMifQ=="],
              "title": "Before"
            },
            "description": "Cursor for backward pagination - get items before this position. Use first_cursor from previous response."
          },
          {
            "name": "include_total",
            "in": "query",
            "required": false,
            "schema": {
              "type": "boolean",
              "description": "Whether to include total count in response (expensive operation)",
              "examples": [false, true],
              "default": false,
              "title": "Include Total"
            },
            "description": "Whether to include total count in response (expensive operation)"
          },
          {
            "name": "q",
            "in": "query",
            "required": false,
            "schema": {
              "anyOf": [{ "type": "string", "minLength": 1, "maxLength": 100 }, { "type": "null" }],
              "description": "Search query for fuzzy matching over name and description fields",
              "title": "Q"
            },
            "description": "Search query for fuzzy matching over name and description fields"
          }
        ],
        "responses": {
          "200": {
            "description": "A list of files for the user",
            "content": {
              "application/json": { "schema": { "$ref": "#/components/schemas/FileListResponse" } }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": { "schema": { "$ref": "#/components/schemas/HTTPValidationError" } }
            }
          }
        }
      }
    },
