    "/v1/stores/search": {
      "post": {
        "tags": ["stores"],
        "summary": "Perform semantic search across store chunks",
        "description": "Perform semantic search across store chunks.\n\nThis endpoint searches through store chunks using semantic similarity matching.\nIt supports complex search queries with filters and returns relevance-scored results.\n\nFor the special 'mixedbread/web' store, this endpoint performs web search using\na mixture of different providers instead of semantic search. Web search results are always\nreranked for consistent scoring.\n\nArgs:\n    search_params: Search configuration including:\n        - query text or embeddings\n        - store_identifiers: List of store identifiers to search\n        - file_ids: Optional list of file IDs to filter chunks by (or tuple of list and condition operator)\n        - metadata filters\n        - pagination parameters\n        - sorting preferences\n    _state: API state dependency\n    _ctx: Service context dependency\n\nReturns:\n    StoreSearchResponse containing:\n        - List of matched chunks with relevance scores\n        - Pagination details including total result count\n\nRaises:\n    HTTPException (400): If search parameters are invalid\n    HTTPException (404): If no vector stores are found to search",
        "operationId": "search_store_chunks",
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/StoreChunkSearchParams",
                "description": "Search parameters including query text, filters and pagination options"
              }
            }
          },
          "required": true
        },
        "responses": {
          "200": {
            "description": "List of semantically similar chunks with relevance scores and pagination details",
            "content": {
              "application/json": { "schema": { "$ref": "#/components/schemas/StoreSearchResponse" } }
            }
          },
          "422": {
            "description": "Validation Error",
            "content": {
              "application/json": { "schema": { "$ref": "#/components/schemas/HTTPValidationError" } }
            }
          }
        },
        "security": [{ "ApiKeyAuth": [] }]
      }
    },
