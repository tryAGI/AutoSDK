                        - sv
                        - fil
                        - ms
                        - ro
                        - uk
                        - el
                        - cs
                        - da
                        - fi
                        - bg
                        - hr
                        - sk
                        - ta
                      type: string
                      description: 'The target language code to dub the audio to (e.g., "es" for Spanish, "fr" for French).'
                    disableVoiceCloning:
                      type: boolean
