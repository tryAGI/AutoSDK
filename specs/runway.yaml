  /v1/uploads:
    post:
      tags:
        - Uploads
      summary: Upload a file
      description: Uploads a temporary media file that can be referenced in API generation requests. The uploaded files will be automatically expired and deleted after a period of time. It is strongly recommended to use our SDKs for this which have a simplified interface that directly accepts file objects.
      parameters:
        - $ref: '#/components/parameters/X-Runway-Version'
      requestBody:
        content:
          application/json:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              required:
                - filename
                - type
              type: object
              properties:
                filename:
                  maxLength: 255
                  minLength: 3
                  type: string
                  description: 'The filename of the file to upload. Must have a valid extension and be a supported media type (image, video, or audio).'
                type:
                  enum:
                    - ephemeral
                  type: string
                  description: The type of upload to create
      responses:
        '200':
          description: The upload URL and Runway URI have been successfully created.
          content:
            application/json:
              schema:
                required:
                  - uploadUrl
                  - fields
                  - runwayUri
                type: object
                properties:
                  uploadUrl:
                    type: string
                    description: The URL to upload your media file to with a POST request.
                    format: uri
                  fields:
                    type: object
                    additionalProperties:
                      type: string
                    description: Fields that must be included in the file upload request as form data.
                    unrecognizedKeywords:
                      propertyNames:
                        type: string
                  runwayUri:
                    pattern: ^runway:\/\/.*
                    type: string
                    description: The Runway upload URI to use in other API generation requests
                additionalProperties: false
        '429':
          description: You have exceeded the rate limit for this endpoint.
      x-codeSamples:
        - lang: TypeScript
          label: Node SDK
          source: "// npm install --save @runwayml/sdk\nimport RunwayML from '@runwayml/sdk';\nimport fs from 'node:fs';\n\n// The env var RUNWAYML_API_SECRET is expected to contain your API key.\nconst client = new RunwayML();\n\nfilename = './funny-cats.mp4';\nconst uploadUri = await client.uploads.createEphemeral(\n  fs.createReadStream(filename),\n);\n\n// Use the runwayUri in generation requests\nconst task = await client.videoToVideo\n  .create({\n    model: 'gen4_aleph',\n    videoUri: uploadUri,\n    promptText: 'Add the easter elements to the cat video',\n    references: [\n      {\n        type: 'image',\n        uri: 'https://example.com/easter-scene.jpg',\n      },\n    ],\n    ratio: '1280:720',\n  })\n  .waitForTaskOutput();\n\nconsole.log(task);"
        - lang: Python
          label: Python SDK
          source: "# pip install runwayml\nfrom runwayml import RunwayML\nfrom pathlib import Path\n\n# The env var RUNWAYML_API_SECRET is expected to contain your API key.\nclient = RunwayML()\n\nfile = Path('./funny-cats.mp4');\nupload_uri = client.uploads.create_ephemeral(\n  file=file,\n)\n\n# Use the upload_uri in generation requests\ntask = client.video_to_video.create(\n  model='gen4_aleph',\n  video_uri=upload_uri,\n  prompt_text='Add the easter elements to the cat video',\n  references=[\n    {\n      'type': 'image',\n      'uri': 'https://example.com/easter-scene.jpg',\n    },\n  ],\n  ratio='1280:720',\n).wait_for_task_output()\n\nprint(task)"
components:
  parameters:
    X-Runway-Version:
      name: X-Runway-Version
      in: header
      description: 'The version of the RunwayML API being used. You can read more about versioning [here](/api-details/versioning).'
      required: true
      schema:
        const: '2024-11-06'
        type: string
        default: '2024-11-06'
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
security:
  - ApiKeyAuth: [ ]
tags:
  - name: Start generating
    description: These endpoints all kick off tasks to create generations.
  - name: Task management
    description: Endpoints for managing tasks that have been submitted.
  - name: Uploads
    description: Endpoints for uploading media files.
