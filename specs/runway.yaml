  /v1/organization/usage:
    post:
      tags:
        - Organization
      summary: Query credit usage
      description: Fetch credit usage data broken down by model and day for the organization associated with the API key used to make the request. Up to 90 days of data can be queried at a time.
      parameters:
        - $ref: '#/components/parameters/X-Runway-Version'
      requestBody:
        content:
          application/json:
            schema:
              $schema: https://json-schema.org/draft/2020-12/schema
              type: object
              properties:
                startDate:
                  pattern: '^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$'
                  type: string
                  description: 'The start date of the usage data in ISO-8601 format (YYYY-MM-DD). If unspecified, it will default to 30 days before the current date. All dates are in UTC.'
                  format: date
                beforeDate:
                  pattern: '^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$'
                  type: string
                  description: 'The end date of the usage data in ISO-8601 format (YYYY-MM-DD), not inclusive. If unspecified, it will default to thirty days after the start date. Must be less than or equal to 90 days after the start date. All dates are in UTC.'
                  format: date
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                required:
                  - results
                  - models
                type: object
                properties:
                  results:
                    type: array
                    items:
                      required:
                        - date
                        - usedCredits
                      type: object
                      properties:
                        date:
                          pattern: '^(?:(?:\d\d[2468][048]|\d\d[13579][26]|\d\d0[48]|[02468][048]00|[13579][26]00)-02-29|\d{4}-(?:(?:0[13578]|1[02])-(?:0[1-9]|[12]\d|3[01])|(?:0[469]|11)-(?:0[1-9]|[12]\d|30)|(?:02)-(?:0[1-9]|1\d|2[0-8])))$'
                          type: string
                          description: The date of the usage data in ISO-8601 format (YYYY-MM-DD). All dates are in UTC.
                          format: date
                        usedCredits:
                          type: array
                          items:
                            title: CreditUsageForModelForDate
                            required:
                              - model
                              - amount
                            type: object
                            properties:
                              model:
                                title: ModelVariant
                                enum:
                                  - gen3a_turbo
                                  - gen4_turbo
                                  - gen4_image
                                  - gen4_image_turbo
                                  - act_two
                                  - gen4_aleph
                                  - veo3
                                  - veo3.1
                                  - veo3.1_fast
                                  - gemini_2.5_flash
                                  - eleven_multilingual_v2
                                  - eleven_text_to_sound_v2
                                  - eleven_voice_isolation
                                  - eleven_voice_dubbing
                                  - eleven_multilingual_sts_v2
                                type: string
                                description: The model that credits were spent on.
                              amount:
                                maximum: 9007199254740991
                                minimum: 0
                                type: integer
                                description: The number of credits spent on the model.
                            additionalProperties: false
                          description: The credits used per model for the given date.
                      additionalProperties: false
                  models:
                    type: array
                    items:
                      title: ModelVariant
                      enum:
                        - gen3a_turbo
                        - gen4_turbo
                        - gen4_image
                        - gen4_image_turbo
                        - act_two
                        - gen4_aleph
                        - veo3
                        - veo3.1
                        - veo3.1_fast
                        - gemini_2.5_flash
                        - eleven_multilingual_v2
                        - eleven_text_to_sound_v2
                        - eleven_voice_isolation
                        - eleven_voice_dubbing
                        - eleven_multilingual_sts_v2
                      type: string
                      description: A model that was used during the queried time range.
                    description: The list of models with usage during the queried time range.
                additionalProperties: false
