                $ref: '#/components/schemas/AssetResponse'

  /scenes/create/from-video:
    post:
      operationId: createSceneFromVideo
      summary: Create scene from video
      tags: [Scenes]
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SceneFromVideoRequest'
