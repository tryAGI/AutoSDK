  # ════════════════════════════════════
  # User
  # ════════════════════════════════════
  /user/:
    get:
      operationId: getUser
      summary: Get current user info
      tags: [User]
      responses:
        '200':
          description: User info
          content:
            application/json:
              schema:
                type: object

  # ════════════════════════════════════
  # Teams
  # ════════════════════════════════════
  /teams/:
    post:
      operationId: createTeam
      summary: Create a team
      tags: [Teams]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamCreateRequest'
      responses:
        '200':
          description: Team created

  /teams/{teamID}:
    get:
      operationId: getTeam
      summary: Get team info
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Team info
    patch:
      operationId: renameTeam
      summary: Rename team
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamRenameRequest'
      responses:
        '200':
          description: Team renamed
    delete:
      operationId: deleteTeam
      summary: Delete team
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Team deleted

  /teams/{teamID}/invite:
    post:
      operationId: inviteToTeam
      summary: Invite user to team
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TeamInviteRequest'
      responses:
        '200':
          description: Invitation sent

  /teams/{teamID}/invite/accept:
    post:
      operationId: acceptTeamInvite
      summary: Accept team invitation
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation accepted

  /teams/{teamID}/invite/invalidate:
    post:
      operationId: invalidateTeamInvite
      summary: Invalidate team invitation
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Invitation invalidated

  /teams/{teamID}/kick:
    post:
      operationId: kickTeamMember
      summary: Kick member from team
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Member kicked

  /teams/{teamID}/leave:
    post:
      operationId: leaveTeam
      summary: Leave team
      tags: [Teams]
      parameters:
        - name: teamID
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Left team

