      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExportRequest'
      responses:
        '200':
          description: Export initiated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssetResponse'

  /scenes/{assetID}/build/cancel:
    post:
      operationId: cancelSceneBuild
      summary: Cancel scene build
      tags: [Scenes]
      parameters:
