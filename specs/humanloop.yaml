      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Environments.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EnvironmentResponse'

  /prompts/{id}/environments/{environmentId}:
    post:
      operationId: setPromptDeployment
      summary: Set Prompt Deployment
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: environmentId
          in: path
          required: true
