paths:
  /prompts:
    get:
      operationId: listPrompts
      summary: List Prompts
      description: Get a paginated list of Prompts.
      tags: [Prompts]
      parameters:
        - name: page
          in: query
          schema: { type: integer }
        - name: size
          in: query
          schema: { type: integer }
        - name: name
          in: query
          schema: { type: string }
        - name: userFilter
          in: query
          schema: { type: string }
        - name: sortBy
          in: query
          schema: { type: string }
        - name: order
          in: query
          schema: { type: string, enum: [asc, desc] }
      responses:
        '200':
          description: Paginated list of Prompts.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedPromptResponse'

    post:
      operationId: upsertPrompt
      summary: Upsert Prompt
      description: Create or update a Prompt.
      tags: [Prompts]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptRequest'
      responses:
        '200':
          description: The Prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'

  /prompts/{id}:
    get:
      operationId: getPrompt
      summary: Get Prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: versionId
          in: query
          schema: { type: string }
        - name: environment
          in: query
          schema: { type: string }
      responses:
        '200':
          description: The Prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'

    patch:
      operationId: movePrompt
      summary: Move Prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveRequest'
      responses:
        '200':
          description: The moved Prompt.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'

    delete:
      operationId: deletePrompt
      summary: Delete Prompt
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Successfully deleted.

  /prompts/{id}/versions:
    get:
      operationId: listPromptVersions
      summary: List Prompt Versions
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: status
          in: query
          schema: { type: string }
      responses:
        '200':
          description: Prompt versions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PromptResponse'

  /prompts/{id}/versions/{versionId}:
    delete:
      operationId: deletePromptVersion
      summary: Delete Prompt Version
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: versionId
          in: path
          required: true
          schema: { type: string }
      responses:
        '204':
          description: Deleted.

    patch:
      operationId: updatePromptVersion
      summary: Update Prompt Version
      tags: [Prompts]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
        - name: versionId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVersionRequest'
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptResponse'

  /prompts/{id}/environments:
    get:
      operationId: listPromptEnvironments
