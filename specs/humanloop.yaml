openapi: 3.0.3
info:
  title: Humanloop API
  description: |
    Humanloop is a platform for prompt management, evaluation, and observability.
    It provides tools for versioning prompts, running evaluations, managing datasets,
    and logging LLM interactions.
  version: "5.0"
  contact:
    name: Humanloop
    url: https://humanloop.com

servers:
  - url: https://api.humanloop.com/v5
    description: Production API

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key

  schemas:
    UserResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the user.
        email:
          type: string
          description: Email address of the user.
        name:
          type: string
          description: Name of the user.
      required:
        - id

    EnvironmentResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the environment.
        name:
          type: string
          description: Name of the environment.
        tag:
          type: string
          description: Tag for the environment.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name

    InputResponse:
      type: object
      properties:
        name:
          type: string
          description: Name of the input variable.
      required:
        - name

    MonitoringEvaluatorResponse:
      type: object
      properties:
        evaluatorId:
          type: string
          description: ID of the Evaluator used for monitoring.
        evaluatorVersionId:
          type: string
          description: Version ID of the Evaluator.
        state:
          type: string
          enum: [active, inactive]
          description: State of the monitoring evaluator.

    EvaluatorAggregate:
      type: object
      properties:
        evaluatorId:
          type: string
        evaluatorVersionId:
          type: string
        value:
          type: number

    ToolFunction:
      type: object
      properties:
        name:
          type: string
          description: Name of the function.
        description:
          type: string
          description: Description of the function.
        parameters:
          type: object
          additionalProperties: true
          description: JSON Schema defining the function parameters.
        strict:
          type: boolean
          description: Whether strict mode is enabled.
      required:
        - name
        - parameters

    LinkedToolResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the linked tool.
        name:
          type: string
          description: Name of the linked tool.
        versionId:
          type: string
          description: Version ID of the linked tool.
      required:
        - id

    ResponseFormat:
      type: object
      properties:
        type:
          type: string
          description: "The format type, e.g. json_object."
      required:
        - type

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [system, user, assistant, tool]
          description: Role of the message author.
        content:
          type: string
          description: The content of the message.
        name:
          type: string
          description: Name of the message author.
        toolCallId:
          type: string
          description: Tool call ID for tool messages.
        toolCalls:
          type: array
          items:
            $ref: '#/components/schemas/ToolCallResponse'
          description: Tool calls made by the assistant.
      required:
        - role

    ToolCallResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the tool call.
        type:
          type: string
          description: Type of the tool call.
        function:
          type: object
          properties:
            name:
              type: string
            arguments:
              type: string
      required:
        - id
        - type

    DatapointResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the datapoint.
        inputs:
          type: object
          additionalProperties: true
        target:
          type: object
          additionalProperties: true
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
      required:
        - id

    DirectoryResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the directory.
        path:
          type: string
          description: Path of the directory.
        name:
          type: string
          description: Name of the directory.
        parentId:
          type: string
          description: ID of the parent directory.
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - path
        - name

    PromptResponse:
      type: object
      description: Response model for a Prompt.
      properties:
        path:
          type: string
          description: Path of the Prompt, including the name, which is used as a unique identifier.
        id:
          type: string
          description: Unique identifier for the Prompt.
        directoryId:
          type: string
          description: ID of the directory that the file is in on Humanloop.
        model:
          type: string
          description: "The model instance used, e.g. gpt-4."
        endpoint:
          type: string
          description: The provider model endpoint used.
        template:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: The template for the prompt as a list of chat messages.
        provider:
          type: string
          description: The company providing the underlying model service.
        maxTokens:
          type: integer
          description: The maximum number of tokens to generate.
        temperature:
          type: number
          description: Sampling temperature for generation.
        topP:
          type: number
          description: Nucleus sampling parameter.
        stop:
          type: string
          description: Stop sequence.
        presencePenalty:
          type: number
          description: Presence penalty value.
        frequencyPenalty:
          type: number
          description: Frequency penalty value.
        other:
          type: object
          additionalProperties: true
          description: Other parameter values to be passed to the provider call.
        seed:
          type: integer
          description: Seed for deterministic sampling.
        responseFormat:
          $ref: '#/components/schemas/ResponseFormat'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolFunction'
        linkedTools:
          type: array
          items:
            $ref: '#/components/schemas/LinkedToolResponse'
        attributes:
          type: object
          additionalProperties: true
          description: Additional fields to describe the Prompt.
        versionName:
          type: string
          description: Unique name for the Prompt version.
        versionDescription:
          type: string
          description: Description of the version.
        description:
          type: string
          description: Description of the Prompt.
        tags:
          type: array
          items:
            type: string
        readme:
          type: string
          description: Long description of the file.
        name:
          type: string
          description: Name of the Prompt.
        schema:
          type: object
          additionalProperties: true
        versionId:
          type: string
          description: Unique identifier for the specific Prompt Version.
        type:
          type: string
          enum: [prompt]
        environments:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserResponse'
        lastUsedAt:
          type: string
          format: date-time
        versionLogsCount:
          type: integer
          description: The number of logs generated for this Prompt Version.
        totalLogsCount:
          type: integer
          description: The number of logs generated across all Prompt Versions.
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputResponse'
        evaluators:
          type: array
          items:
            $ref: '#/components/schemas/MonitoringEvaluatorResponse'
        evaluatorAggregates:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorAggregate'
      required:
        - path
        - id
        - model
        - name
        - versionId
        - createdAt
        - updatedAt
        - lastUsedAt
        - versionLogsCount
        - totalLogsCount
        - inputs

    PromptRequest:
      type: object
      description: Request to create or update a Prompt.
      properties:
        path:
          type: string
          description: "Path of the Prompt, including the name."
        id:
          type: string
          description: ID for an existing Prompt.
        model:
          type: string
          description: "The model instance used, e.g. gpt-4."
        endpoint:
          type: string
          description: The provider model endpoint used.
        template:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: The template for the prompt.
        provider:
          type: string
          description: The company providing the underlying model service.
        maxTokens:
          type: integer
          description: The maximum number of tokens to generate.
        temperature:
          type: number
          description: Sampling temperature.
        topP:
          type: number
        stop:
          type: string
        presencePenalty:
          type: number
        frequencyPenalty:
          type: number
        other:
          type: object
          additionalProperties: true
        seed:
          type: integer
        responseFormat:
          $ref: '#/components/schemas/ResponseFormat'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolFunction'
        linkedTools:
          type: array
          items:
            type: string
          description: IDs of Tools linked to this prompt.
        attributes:
          type: object
          additionalProperties: true
        versionName:
          type: string
        versionDescription:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        readme:
          type: string
      required:
        - model

    PaginatedPromptResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/PromptResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
        - records
        - page
        - size
        - total

    PromptCallRequest:
      type: object
      description: Request to call a Prompt (proxied LLM call with logging).
      properties:
        versionId:
          type: string
          description: A specific Version ID of the Prompt to call.
        environment:
          type: string
          description: Name of the Environment identifying a deployed version.
        path:
          type: string
          description: Path of the Prompt.
        id:
          type: string
          description: ID for an existing Prompt.
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          description: The messages passed to the provider.
        prompt:
          $ref: '#/components/schemas/PromptRequest'
        inputs:
          type: object
          additionalProperties: true
          description: The inputs passed to the prompt template.
        source:
          type: string
          description: Identifies where the model was called from.
        metadata:
          type: object
          additionalProperties: true
        save:
          type: boolean
          description: Whether the request/response payloads will be stored.
        logId:
          type: string
          description: Custom Log ID.
        numSamples:
          type: integer
          description: The number of generations.
        returnInputs:
          type: boolean
          description: Whether to return the inputs in the response.
        traceParentId:
          type: string
          description: The ID of the parent Log to nest this Log under.
        user:
          type: string
          description: End-user ID related to the Log.

    PromptCallResponse:
      type: object
      description: Response from calling a Prompt.
      properties:
        id:
          type: string
          description: Unique identifier for the log.
        versionId:
          type: string
          description: Version ID of the Prompt used.
        output:
          type: string
          description: Generated text output.
        outputMessage:
          $ref: '#/components/schemas/ChatMessage'
        promptTokens:
          type: integer
        outputTokens:
          type: integer
        promptCost:
          type: number
        outputCost:
          type: number
        finishReason:
          type: string
        inputs:
          type: object
          additionalProperties: true
        providerLatency:
          type: number
          description: Provider latency in seconds.
        createdAt:
          type: string
          format: date-time
      required:
        - id

    PromptLogRequest:
      type: object
      description: Request to log a Prompt call.
      properties:
        versionId:
          type: string
        environment:
          type: string
        runId:
          type: string
          description: Unique identifier for the Run.
        path:
          type: string
        id:
          type: string
        outputMessage:
          $ref: '#/components/schemas/ChatMessage'
        promptTokens:
          type: integer
        reasoningTokens:
          type: integer
        outputTokens:
          type: integer
        promptCost:
          type: number
        outputCost:
          type: number
        finishReason:
          type: string
        messages:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
        prompt:
          $ref: '#/components/schemas/PromptRequest'
        startTime:
          type: string
          format: date-time
        endTime:
          type: string
          format: date-time
        output:
          type: string
        createdAt:
          type: string
          format: date-time
        error:
          type: string
        providerLatency:
          type: number
        inputs:
          type: object
          additionalProperties: true
        source:
          type: string
        metadata:
          type: object
          additionalProperties: true
        sourceDatapointId:
          type: string
        traceParentId:
          type: string
        user:
          type: string
        save:
          type: boolean
        logId:
          type: string

    CreatePromptLogResponse:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the created log.
        promptId:
          type: string
        versionId:
          type: string
        traceParentId:
          type: string
      required:
        - id

    DatasetResponse:
      type: object
      description: Response model for a Dataset.
      properties:
        path:
          type: string
          description: Path of the Dataset.
        id:
          type: string
          description: Unique identifier for the Dataset.
        directoryId:
          type: string
        name:
          type: string
          description: Name of the Dataset.
        description:
          type: string
        schema:
          type: object
          additionalProperties: true
        readme:
          type: string
        tags:
          type: array
          items:
            type: string
        versionId:
          type: string
          description: Unique identifier for the specific Dataset Version.
        type:
          type: string
          enum: [dataset]
        environments:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserResponse'
        lastUsedAt:
          type: string
          format: date-time
        versionName:
          type: string
        versionDescription:
          type: string
        datapointsCount:
          type: integer
          description: The number of Datapoints in this Dataset version.
        datapoints:
          type: array
          items:
            $ref: '#/components/schemas/DatapointResponse'
        attributes:
          type: object
          additionalProperties: true
      required:
        - path
        - id
        - name
        - versionId
        - createdAt
        - updatedAt
        - lastUsedAt
        - datapointsCount

    DatasetRequest:
      type: object
      description: Request to create or update a Dataset.
      properties:
        path:
          type: string
          description: Path of the Dataset.
        id:
          type: string
        description:
          type: string
        datapoints:
          type: array
          items:
            $ref: '#/components/schemas/DatapointResponse'
        attributes:
          type: object
          additionalProperties: true
        versionName:
          type: string
        versionDescription:
          type: string
        tags:
          type: array
          items:
            type: string
        readme:
          type: string

    PaginatedDatasetResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/DatasetResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
        - records
        - page
        - size
        - total

    EvaluatorResponse:
      type: object
      description: Response model for an Evaluator.
      properties:
        path:
          type: string
          description: Path of the Evaluator.
        id:
          type: string
          description: Unique identifier for the Evaluator.
        directoryId:
          type: string
        versionName:
          type: string
        versionDescription:
          type: string
        spec:
          type: object
          additionalProperties: true
          description: The evaluator specification.
        name:
          type: string
          description: Name of the Evaluator.
        description:
          type: string
        schema:
          type: object
          additionalProperties: true
        readme:
          type: string
        tags:
          type: array
          items:
            type: string
        versionId:
          type: string
          description: Unique identifier for the specific Evaluator Version.
        type:
          type: string
          enum: [evaluator]
        environments:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserResponse'
        lastUsedAt:
          type: string
          format: date-time
        versionLogsCount:
          type: integer
        totalLogsCount:
          type: integer
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputResponse'
        evaluators:
          type: array
          items:
            $ref: '#/components/schemas/MonitoringEvaluatorResponse'
        evaluatorAggregates:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorAggregate'
        attributes:
          type: object
          additionalProperties: true
      required:
        - path
        - id
        - name
        - versionId
        - createdAt
        - updatedAt
        - lastUsedAt
        - versionLogsCount
        - totalLogsCount
        - inputs

    EvaluatorRequest:
      type: object
      description: Request to create or update an Evaluator.
      properties:
        path:
          type: string
        id:
          type: string
        spec:
          type: object
          additionalProperties: true
          description: The evaluator specification.
        attributes:
          type: object
          additionalProperties: true
        versionName:
          type: string
        versionDescription:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        readme:
          type: string

    PaginatedEvaluatorResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
        - records
        - page
        - size
        - total

    EvaluationResponse:
      type: object
      description: Response model for an Evaluation.
      properties:
        id:
          type: string
          description: Unique identifier for the Evaluation.
        runsCount:
          type: integer
          description: Total number of Runs in the Evaluation.
        evaluators:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationEvaluatorResponse'
        name:
          type: string
          description: Name of the Evaluation.
        fileId:
          type: string
          description: ID of the File associated with the Evaluation.
        createdAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserResponse'
        updatedAt:
          type: string
          format: date-time
        url:
          type: string
          description: URL to view the Evaluation on Humanloop.
        status:
          type: string
          enum: [pending, running, completed, failed, cancelled]
      required:
        - id
        - runsCount
        - evaluators
        - createdAt
        - updatedAt

    EvaluationEvaluatorResponse:
      type: object
      properties:
        evaluatorId:
          type: string
        evaluatorVersionId:
          type: string
        name:
          type: string
        path:
          type: string

    EvaluationRequest:
      type: object
      description: Request to create an Evaluation.
      properties:
        fileId:
          type: string
          description: ID of the File to evaluate.
        name:
          type: string
          description: Name of the Evaluation.
        evaluatorIds:
          type: array
          items:
            type: string
          description: IDs of Evaluators to use.
        datasetId:
          type: string
          description: ID of the Dataset to use.

    PaginatedEvaluationResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/EvaluationResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
        - records
        - page
        - size
        - total

    ToolResponse:
      type: object
      description: Response model for a Tool.
      properties:
        path:
          type: string
          description: Path of the Tool.
        id:
          type: string
          description: Unique identifier for the Tool.
        directoryId:
          type: string
        function:
          $ref: '#/components/schemas/ToolFunction'
        sourceCode:
          type: string
          description: Code source of the Tool.
        setupValues:
          type: object
          additionalProperties: true
        attributes:
          type: object
          additionalProperties: true
        toolType:
          type: string
          description: Type of Tool.
        versionName:
          type: string
        versionDescription:
          type: string
        name:
          type: string
          description: Name of the Tool.
        description:
          type: string
        readme:
          type: string
        tags:
          type: array
          items:
            type: string
        versionId:
          type: string
          description: Unique identifier for the specific Tool Version.
        type:
          type: string
          enum: [tool]
        environments:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserResponse'
        lastUsedAt:
          type: string
          format: date-time
        versionLogsCount:
          type: integer
        totalLogsCount:
          type: integer
        inputs:
          type: array
          items:
            $ref: '#/components/schemas/InputResponse'
        evaluators:
          type: array
          items:
            $ref: '#/components/schemas/MonitoringEvaluatorResponse'
        evaluatorAggregates:
          type: array
          items:
            $ref: '#/components/schemas/EvaluatorAggregate'
        signature:
          type: string
      required:
        - path
        - id
        - name
        - versionId
        - createdAt
        - updatedAt
        - lastUsedAt
        - versionLogsCount
        - totalLogsCount
        - inputs

    ToolRequest:
      type: object
      properties:
        path:
          type: string
        id:
          type: string
        function:
          $ref: '#/components/schemas/ToolFunction'
        sourceCode:
          type: string
        setupValues:
          type: object
          additionalProperties: true
        attributes:
          type: object
          additionalProperties: true
        toolType:
          type: string
        versionName:
          type: string
        versionDescription:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        readme:
          type: string

    PaginatedToolResponse:
      type: object
      properties:
        records:
          type: array
          items:
            $ref: '#/components/schemas/ToolResponse'
        page:
          type: integer
        size:
          type: integer
        total:
          type: integer
      required:
        - records
        - page
        - size
        - total

    FlowResponse:
      type: object
      description: Response model for a Flow.
      properties:
        path:
          type: string
        id:
          type: string
        directoryId:
          type: string
        name:
          type: string
        description:
          type: string
        readme:
          type: string
        tags:
          type: array
          items:
            type: string
        versionId:
          type: string
        type:
          type: string
          enum: [flow]
        environments:
          type: array
          items:
            $ref: '#/components/schemas/EnvironmentResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserResponse'
        lastUsedAt:
          type: string
          format: date-time
        versionName:
          type: string
        versionDescription:
          type: string
        attributes:
          type: object
          additionalProperties: true
      required:
        - path
        - id
        - name
        - versionId
        - createdAt
        - updatedAt
        - lastUsedAt

    FlowRequest:
      type: object
      properties:
        path:
          type: string
        id:
          type: string
        attributes:
          type: object
          additionalProperties: true
        versionName:
          type: string
        versionDescription:
          type: string
        description:
          type: string
        tags:
          type: array
          items:
            type: string
        readme:
          type: string

    PaginatedFlowResponse:
      type: object
      properties:
        records:
          type: array
