          x-stainless-any: true
          description: The midpoint of the Decay operator.
        exponent:
          type: number
          description: An exponent that helps further control the shape of the Decay function.
      additionalProperties: false
    Filter:
      anyOf:
        - type: array
          description: >
            Exact match for attribute value. If `null`, matches documents missing the attribute.

          prefixItems:
            - type: string
              title: attr
              description: The name of the attribute to apply the filter to.
            - const: Eq
            - x-stainless-any: true
