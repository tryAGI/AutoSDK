openapi: 3.0.3
info:
  title: Hume AI API
  description: >
    Hume AI API for emotion recognition, expression measurement,
    empathic voice interface (EVI), and text-to-speech (TTS).
  version: "0.1.0"
  contact:
    name: Hume AI
    url: https://hume.ai
servers:
  - url: https://api.hume.ai
    description: Production

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: API key authentication using Bearer token

  schemas:
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error type
        message:
          type: string
          description: Error message

    EmotionScore:
      type: object
      properties:
        name:
          type: string
          description: Name of the emotion
        score:
          type: number
          format: double
          description: Confidence score between 0 and 1

    BoundingBox:
      type: object
      properties:
        x:
          type: number
          format: double
        "y":
          type: number
          format: double
        w:
          type: number
          format: double
        h:
          type: number
          format: double

    TimeInterval:
      type: object
      properties:
        begin:
          type: number
          format: double
          description: Start time in seconds
        end:
          type: number
          format: double
          description: End time in seconds

    FacePrediction:
      type: object
      properties:
        frame:
          type: integer
          description: Frame number
        time:
          type: number
          format: double
          description: Time in seconds
        bounding_box:
          $ref: '#/components/schemas/BoundingBox'
        prob:
          type: number
          format: double
          description: Detection probability
        emotions:
          type: array
          items:
            $ref: '#/components/schemas/EmotionScore'
        facs:
          type: array
          items:
            $ref: '#/components/schemas/FacsScore'
          nullable: true
        descriptions:
          type: array
          items:
            $ref: '#/components/schemas/DescriptionsScore'
          nullable: true

    FacsScore:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
          format: double

    DescriptionsScore:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
          format: double

    ProsodyPrediction:
      type: object
      properties:
        time:
          $ref: '#/components/schemas/TimeInterval'
        emotions:
          type: array
          items:
            $ref: '#/components/schemas/EmotionScore'

    LanguagePrediction:
      type: object
      properties:
        text:
          type: string
        position:
          $ref: '#/components/schemas/PositionInterval'
        emotions:
          type: array
          items:
            $ref: '#/components/schemas/EmotionScore'
        sentiment:
          type: array
          items:
            $ref: '#/components/schemas/SentimentScore'
          nullable: true
        toxicity:
          type: array
          items:
            $ref: '#/components/schemas/ToxicityScore'
          nullable: true

    PositionInterval:
      type: object
      properties:
        begin:
          type: integer
        end:
          type: integer

    SentimentScore:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
          format: double

    ToxicityScore:
      type: object
      properties:
        name:
          type: string
        score:
          type: number
          format: double

    BurstPrediction:
      type: object
      properties:
        time:
          $ref: '#/components/schemas/TimeInterval'
        emotions:
          type: array
          items:
            $ref: '#/components/schemas/EmotionScore'

    NerPrediction:
      type: object
      properties:
        entity:
          type: string
        position:
          $ref: '#/components/schemas/PositionInterval'
        link:
          type: string
          nullable: true
        entity_confidence:
          type: number
          format: double
        emotions:
          type: array
          items:
            $ref: '#/components/schemas/EmotionScore'

    FaceModelConfig:
      type: object
      properties:
        fps_pred:
          type: number
          format: double
          nullable: true
        prob_threshold:
          type: number
          format: double
          nullable: true
        identify_faces:
          type: boolean
          nullable: true
        min_face_size:
          type: integer
          nullable: true
        facs:
          type: object
          nullable: true
        descriptions:
          type: object
          nullable: true
        save_faces:
          type: boolean
          nullable: true

    ProsodyModelConfig:
      type: object
      properties:
        granularity:
          type: string
          nullable: true
          enum:
            - word
            - sentence
            - conversational_turn
            - utterance
        identify_speakers:
          type: boolean
          nullable: true

    LanguageModelConfig:
      type: object
      properties:
        granularity:
          type: string
          nullable: true
          enum:
            - word
            - sentence
            - passage
        sentiment:
          type: object
          nullable: true
        toxicity:
          type: object
          nullable: true
        identify_speakers:
          type: boolean
          nullable: true

    BurstModelConfig:
      type: object
      nullable: true

    NerModelConfig:
      type: object
      properties:
        identify_speakers:
          type: boolean
          nullable: true

    ModelsConfig:
      type: object
      properties:
        face:
          $ref: '#/components/schemas/FaceModelConfig'
          nullable: true
        prosody:
          $ref: '#/components/schemas/ProsodyModelConfig'
          nullable: true
        language:
          $ref: '#/components/schemas/LanguageModelConfig'
          nullable: true
        burst:
          $ref: '#/components/schemas/BurstModelConfig'
          nullable: true
        ner:
          $ref: '#/components/schemas/NerModelConfig'
          nullable: true

    TranscriptionConfig:
      type: object
      properties:
        language:
          type: string
          nullable: true

    InferenceBaseRequest:
      type: object
      properties:
        models:
          $ref: '#/components/schemas/ModelsConfig'
          nullable: true
        transcription:
          $ref: '#/components/schemas/TranscriptionConfig'
          nullable: true
        urls:
          type: array
          items:
            type: string
            format: uri
          nullable: true
        text:
          type: array
          items:
            type: string
          nullable: true
        callback_url:
          type: string
          format: uri
          nullable: true
        notify:
          type: boolean
          nullable: true

    JobId:
      type: object
      properties:
        job_id:
          type: string

    InferenceJob:
      type: object
      properties:
        job_id:
          type: string
        user_id:
          type: string
          nullable: true
        request:
          $ref: '#/components/schemas/InferenceRequest'
        state:
          $ref: '#/components/schemas/JobState'
        type:
          type: string
          enum:
            - INFERENCE
            - EMBEDDING_GENERATION
            - CUSTOM_MODELS_INFERENCE
            - TL_INFERENCE
            - TRAINING
        created_timestamp_ms:
          type: integer
          format: int64
          nullable: true
        started_timestamp_ms:
          type: integer
          format: int64
          nullable: true
        ended_timestamp_ms:
          type: integer
          format: int64
          nullable: true

    InferenceRequest:
      type: object
      properties:
        models:
          $ref: '#/components/schemas/ModelsConfig'
          nullable: true
        transcription:
          $ref: '#/components/schemas/TranscriptionConfig'
          nullable: true
        urls:
          type: array
          items:
            type: string
          nullable: true
        text:
          type: array
          items:
            type: string
          nullable: true
        files:
          type: array
          items:
            $ref: '#/components/schemas/SourceFile'
          nullable: true

    SourceFile:
      type: object
      properties:
        filename:
          type: string
        content_type:
          type: string
        md5sum:
          type: string

    JobState:
      type: object
      properties:
        status:
          type: string
          enum:
            - QUEUED
            - IN_PROGRESS
            - COMPLETED
            - FAILED
        created_timestamp_ms:
          type: integer
          format: int64
          nullable: true
        started_timestamp_ms:
          type: integer
          format: int64
          nullable: true
        ended_timestamp_ms:
          type: integer
          format: int64
          nullable: true
        message:
          type: string
          nullable: true

    InferenceSourcePredictResult:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/Source'
        results:
          $ref: '#/components/schemas/InferenceResults'

    Source:
      type: object
      properties:
        type:
          type: string
          enum: [url, file, text]
        url:
          type: string
          nullable: true
        filename:
          type: string
          nullable: true
        content_type:
          type: string
          nullable: true
        text:
          type: string
          nullable: true

    InferenceResults:
      type: object
      properties:
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/InferencePrediction'
        errors:
          type: array
          items:
            $ref: '#/components/schemas/InferenceError'

    InferencePrediction:
      type: object
      properties:
        file:
          type: string
          nullable: true
        models:
          $ref: '#/components/schemas/ModelsPredictions'

    ModelsPredictions:
      type: object
      properties:
        face:
          $ref: '#/components/schemas/FaceModelPredictions'
          nullable: true
        prosody:
          $ref: '#/components/schemas/ProsodyModelPredictions'
          nullable: true
        language:
          $ref: '#/components/schemas/LanguageModelPredictions'
          nullable: true
        burst:
          $ref: '#/components/schemas/BurstModelPredictions'
          nullable: true
        ner:
          $ref: '#/components/schemas/NerModelPredictions'
          nullable: true

    FaceModelPredictions:
      type: object
      properties:
        grouped_predictions:
          type: array
          items:
            $ref: '#/components/schemas/GroupedFacePredictions'

    ProsodyModelPredictions:
      type: object
      properties:
        grouped_predictions:
          type: array
          items:
            $ref: '#/components/schemas/GroupedProsodyPredictions'

    LanguageModelPredictions:
      type: object
      properties:
        grouped_predictions:
          type: array
          items:
            $ref: '#/components/schemas/GroupedLanguagePredictions'

    BurstModelPredictions:
      type: object
      properties:
        grouped_predictions:
          type: array
          items:
            $ref: '#/components/schemas/GroupedBurstPredictions'

    NerModelPredictions:
      type: object
      properties:
        grouped_predictions:
          type: array
          items:
            $ref: '#/components/schemas/GroupedNerPredictions'

    GroupedFacePredictions:
      type: object
      properties:
        id:
          type: string
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/FacePrediction'

    GroupedProsodyPredictions:
      type: object
      properties:
        id:
          type: string
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/ProsodyPrediction'

    GroupedLanguagePredictions:
      type: object
      properties:
        id:
          type: string
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/LanguagePrediction'

    GroupedBurstPredictions:
      type: object
      properties:
        id:
          type: string
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/BurstPrediction'

    GroupedNerPredictions:
      type: object
      properties:
        id:
          type: string
        predictions:
          type: array
          items:
            $ref: '#/components/schemas/NerPrediction'

    InferenceError:
      type: object
      properties:
        message:
          type: string
        file:
          type: string
          nullable: true

    PostedTts:
      type: object
      required:
        - utterances
      properties:
        format:
          $ref: '#/components/schemas/AudioFormat'
          nullable: true
        num_generations:
          type: integer
          nullable: true
        utterances:
          type: array
          items:
            $ref: '#/components/schemas/PostedUtterance'
        context:
          $ref: '#/components/schemas/PostedContext'
          nullable: true

    PostedUtterance:
      type: object
      required:
        - text
      properties:
        text:
          type: string
        description:
          type: string
          nullable: true
        voice:
          $ref: '#/components/schemas/PostedUtteranceVoice'
          nullable: true
        speed:
          type: number
          format: double
          nullable: true
        trailing_silence:
          type: number
          format: double
          nullable: true
        instant_mode:
          type: boolean
          nullable: true

    PostedUtteranceVoice:
      type: object
      properties:
        id:
          type: string
          nullable: true
        name:
          type: string
          nullable: true
        provider:
          type: string
          nullable: true
          enum:
            - HUME_AI
            - CUSTOM

    PostedContext:
      type: object
      properties:
        generation_id:
          type: string
          nullable: true
        utterances:
          type: array
          items:
            $ref: '#/components/schemas/PostedUtterance'
          nullable: true

    AudioFormat:
      type: object
      properties:
        type:
          type: string
          enum:
            - mp3
            - pcm
            - wav
        sample_rate:
          type: integer
          nullable: true
        bit_depth:
          type: integer
          nullable: true

    ReturnTts:
      type: object
      properties:
        generation_id:
          type: string
        generations:
          type: array
          items:
            $ref: '#/components/schemas/ReturnGeneration'
        snippets:
          type: array
          items:
            $ref: '#/components/schemas/Snippet'

    ReturnGeneration:
      type: object
      properties:
        generation_id:
          type: string
        duration:
          type: number
          format: double
        audio:
          type: string

    Snippet:
      type: object
      properties:
        audio:
          type: string
        generation_id:
          type: string
        snippet_id:
          type: string
        duration:
          type: number
          format: double

    PostedVoice:
      type: object
      required:
        - generation_id
        - name
      properties:
        generation_id:
          type: string
        name:
          type: string

    ReturnVoice:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        provider:
          type: string
          enum:
            - HUME_AI
            - CUSTOM
        created_on:
          type: integer
          format: int64
        modified_on:
          type: integer
          format: int64

    ReturnPagedVoices:
      type: object
      properties:
        page_number:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        voices_page:
          type: array
          items:
            $ref: '#/components/schemas/ReturnVoice'

    ConvertVoiceJsonRequest:
      type: object
      properties:
        source_audio:
          type: string
        source_voice_id:
          type: string
          nullable: true
        target_voice_id:
          type: string
          nullable: true
        target_voice_name:
          type: string
          nullable: true

    PostedConfig:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        version_description:
          type: string
          nullable: true
        evi_version:
          type: string
          nullable: true
        prompt:
          $ref: '#/components/schemas/PostedConfigPromptSpec'
          nullable: true
        voice:
          $ref: '#/components/schemas/PostedUtteranceVoice'
          nullable: true
        language_model:
          $ref: '#/components/schemas/PostedLanguageModel'
          nullable: true
        ellm_model:
          $ref: '#/components/schemas/PostedEllmModel'
          nullable: true
        tools:
          type: array
          items:
            $ref: '#/components/schemas/PostedUserDefinedToolSpec'
          nullable: true
        builtin_tools:
          type: array
          items:
            $ref: '#/components/schemas/PostedBuiltinTool'
          nullable: true
        event_messages:
          $ref: '#/components/schemas/PostedEventMessageSpecs'
          nullable: true
        timeouts:
          $ref: '#/components/schemas/PostedTimeoutSpecs'
          nullable: true

    PostedConfigPromptSpec:
      type: object
      properties:
        id:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
        text:
          type: string
          nullable: true

    PostedLanguageModel:
      type: object
      properties:
        model_provider:
          type: string
          enum:
            - OPEN_AI
            - CUSTOM_LANGUAGE_MODEL
            - ANTHROPIC
            - FIREWORKS
            - GROQ
            - GOOGLE
          nullable: true
        model_resource:
          type: string
          nullable: true
        temperature:
          type: number
          format: double
          nullable: true

    PostedEllmModel:
      type: object
      properties:
        allow_short_responses:
          type: boolean
          nullable: true

    PostedUserDefinedToolSpec:
      type: object
      properties:
        id:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true

    PostedBuiltinTool:
      type: object
      properties:
        name:
          type: string
          enum:
            - web_search
            - hang_up
        fallback_content:
          type: string
          nullable: true

    PostedEventMessageSpecs:
      type: object
      properties:
        on_new_chat:
          $ref: '#/components/schemas/PostedEventMessageSpec'
          nullable: true
        on_inactivity_timeout:
          $ref: '#/components/schemas/PostedEventMessageSpec'
          nullable: true
        on_max_duration_timeout:
          $ref: '#/components/schemas/PostedEventMessageSpec'
          nullable: true

    PostedEventMessageSpec:
      type: object
      properties:
        enabled:
          type: boolean
        text:
          type: string
          nullable: true

    PostedTimeoutSpecs:
      type: object
      properties:
        inactivity:
          $ref: '#/components/schemas/PostedTimeoutSpecsInactivity'
          nullable: true
        max_duration:
          $ref: '#/components/schemas/PostedTimeoutSpecsMaxDuration'
          nullable: true

    PostedTimeoutSpecsInactivity:
      type: object
      properties:
        enabled:
          type: boolean
        duration_secs:
          type: integer
          nullable: true

    PostedTimeoutSpecsMaxDuration:
      type: object
      properties:
        enabled:
          type: boolean
        duration_secs:
          type: integer
          nullable: true

    PostedConfigVersion:
      type: object
      properties:
        version_description:
          type: string
          nullable: true
        evi_version:
          type: string
          nullable: true
        prompt:
          $ref: '#/components/schemas/PostedConfigPromptSpec'
          nullable: true
        voice:
          $ref: '#/components/schemas/PostedUtteranceVoice'
          nullable: true
        language_model:
          $ref: '#/components/schemas/PostedLanguageModel'
          nullable: true
        ellm_model:
          $ref: '#/components/schemas/PostedEllmModel'
          nullable: true
        tools:
          type: array
          items:
            $ref: '#/components/schemas/PostedUserDefinedToolSpec'
          nullable: true
        builtin_tools:
          type: array
          items:
            $ref: '#/components/schemas/PostedBuiltinTool'
          nullable: true
        event_messages:
          $ref: '#/components/schemas/PostedEventMessageSpecs'
          nullable: true
        timeouts:
          $ref: '#/components/schemas/PostedTimeoutSpecs'
          nullable: true

    PostedConfigName:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    PostedConfigVersionDescription:
      type: object
      properties:
        version_description:
          type: string
          nullable: true

    ReturnConfig:
      type: object
      properties:
        id:
          type: string
        version:
          type: integer
        version_type:
          type: string
          nullable: true
        version_description:
          type: string
          nullable: true
        name:
          type: string
        created_on:
          type: integer
          format: int64
        modified_on:
          type: integer
          format: int64
        evi_version:
          type: string
          nullable: true
        prompt:
          $ref: '#/components/schemas/ReturnConfigPromptSpec'
          nullable: true
        voice:
          $ref: '#/components/schemas/ReturnVoice'
          nullable: true
        language_model:
          $ref: '#/components/schemas/ReturnLanguageModel'
          nullable: true
        ellm_model:
          $ref: '#/components/schemas/ReturnEllmModel'
          nullable: true
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ReturnToolItem'
          nullable: true
        builtin_tools:
          type: array
          items:
            $ref: '#/components/schemas/ReturnBuiltinTool'
          nullable: true
        event_messages:
          $ref: '#/components/schemas/ReturnEventMessageSpecs'
          nullable: true
        timeouts:
          $ref: '#/components/schemas/ReturnTimeoutSpecs'
          nullable: true

    ReturnConfigPromptSpec:
      type: object
      properties:
        id:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
        text:
          type: string
          nullable: true

    ReturnLanguageModel:
      type: object
      properties:
        model_provider:
          type: string
          nullable: true
        model_resource:
          type: string
          nullable: true
        temperature:
          type: number
          format: double
          nullable: true

    ReturnEllmModel:
      type: object
      properties:
        allow_short_responses:
          type: boolean
          nullable: true

    ReturnToolItem:
      type: object
      properties:
        tool_type:
          type: string
          enum:
            - BUILTIN
            - FUNCTION
        id:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
        name:
          type: string
          nullable: true

    ReturnBuiltinTool:
      type: object
      properties:
        tool_type:
          type: string
        name:
          type: string
        fallback_content:
          type: string
          nullable: true

    ReturnEventMessageSpecs:
      type: object
      properties:
        on_new_chat:
          $ref: '#/components/schemas/ReturnEventMessageSpec'
          nullable: true
        on_inactivity_timeout:
          $ref: '#/components/schemas/ReturnEventMessageSpec'
          nullable: true
        on_max_duration_timeout:
          $ref: '#/components/schemas/ReturnEventMessageSpec'
          nullable: true

    ReturnEventMessageSpec:
      type: object
      properties:
        enabled:
          type: boolean
        text:
          type: string
          nullable: true

    ReturnTimeoutSpecs:
      type: object
      properties:
        inactivity:
          $ref: '#/components/schemas/ReturnTimeoutSpec'
          nullable: true
        max_duration:
          $ref: '#/components/schemas/ReturnTimeoutSpec'
          nullable: true

    ReturnTimeoutSpec:
      type: object
      properties:
        enabled:
          type: boolean
        duration_secs:
          type: integer
          nullable: true

    ReturnPagedConfigs:
      type: object
      properties:
        page_number:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        configs_page:
          type: array
          items:
            $ref: '#/components/schemas/ReturnConfig'

    PostedPrompt:
      type: object
      required:
        - name
        - text
      properties:
        name:
          type: string
        version_description:
          type: string
          nullable: true
        text:
          type: string

    PostedPromptVersion:
      type: object
      required:
        - text
      properties:
        version_description:
          type: string
          nullable: true
        text:
          type: string

    PostedPromptName:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    PostedPromptVersionDescription:
      type: object
      properties:
        version_description:
          type: string
          nullable: true

    ReturnPrompt:
      type: object
      properties:
        id:
          type: string
        version:
          type: integer
        version_type:
          type: string
          nullable: true
        version_description:
          type: string
          nullable: true
        name:
          type: string
        created_on:
          type: integer
          format: int64
        modified_on:
          type: integer
          format: int64
        text:
          type: string
          nullable: true

    ReturnPagedPrompts:
      type: object
      properties:
        page_number:
          type: integer
        page_size:
