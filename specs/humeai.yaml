paths:
  /v0/batch/jobs:
    get:
      operationId: listBatchJobs
      summary: List batch jobs
      description: List all batch inference jobs
      tags: [Batch]
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            nullable: true
        - name: status
          in: query
          schema:
            type: string
            enum: [QUEUED, IN_PROGRESS, COMPLETED, FAILED]
            nullable: true
        - name: when
          in: query
          schema:
            type: integer
            format: int64
            nullable: true
        - name: timestamp_ms
          in: query
          schema:
            type: integer
            format: int64
            nullable: true
        - name: sort_by
          in: query
          schema:
            type: string
            enum: [created]
            nullable: true
        - name: direction
          in: query
          schema:
            type: string
            enum: [asc, desc]
            nullable: true
      responses:
        '200':
          description: List of batch jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/InferenceJob'
    post:
      operationId: startBatchInferenceJob
      summary: Start a batch inference job
      description: Submit media URLs or text for emotion analysis
      tags: [Batch]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InferenceBaseRequest'
