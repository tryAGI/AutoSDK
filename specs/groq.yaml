                  const completion = await groq.chat.completions
                    .create({
                      messages: [
                        {
                          role: "user",
                          content: "Explain the importance of fast language models",
                        },
                      ],
                      model: "llama-3.3-70b-versatile",
                    })
                  console.log(completion.choices[0].message.content);
