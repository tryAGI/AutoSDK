            name:
              type: string
              description: The name of the function to call.
        tool_calls:
          type: array
          items:
            $ref: '#/components/schemas/ChatCompletionMessageToolCallChunk'
        executed_tools:
          $ref: '#/components/schemas/ChatCompletionMessageExecutedTools'
        role:
          type: string
          enum:
            - system
            - user
            - assistant
            - tool
          description: The role of the author of this message.
        annotations:
          type: array
          description: A list of annotations providing citations and references for the content in the message.
          items:
            $ref: '#/components/schemas/Annotation'
    CreateChatCompletionRequest:
      type: object
      additionalProperties: false
      properties:
        messages:
          description: A list of messages comprising the conversation so far.
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ChatCompletionRequestMessage'
        model:
          description: >-
            ID of the model to use. For details on which models are compatible with the Chat API, see
            available [models](https://console.groq.com/docs/models)
          example: meta-llama/llama-4-scout-17b-16e-instruct
          anyOf:
            - type: string
            - type: string
              enum:
                - compound-beta
                - compound-beta-mini
                - gemma2-9b-it
                - llama-3.1-8b-instant
                - llama-3.3-70b-versatile
                - meta-llama/llama-4-maverick-17b-128e-instruct
                - meta-llama/llama-4-scout-17b-16e-instruct
                - meta-llama/llama-guard-4-12b
                - moonshotai/kimi-k2-instruct
                - openai/gpt-oss-120b
                - openai/gpt-oss-20b
                - qwen/qwen3-32b
        disable_tool_validation:
          type: boolean
          default: false
          description: >
            If set to true, groq will return called tools without validating that the tool is present in
            request.tools. tool_choice=required/none will still be enforced, but the request cannot require a
            specific tool be used.
        frequency_penalty:
          type: number
          default: 0
          minimum: -2
          maximum: 2
          nullable: true
          description: >-
            This is not yet supported by any of our models. Number between -2.0 and 2.0. Positive values
            penalize new tokens based on their existing frequency in the text so far, decreasing the model's
            likelihood to repeat the same line verbatim.
        include_reasoning:
          type: boolean
          nullable: true
          description: >
            Whether to include reasoning in the response.  If true, the response will include a `reasoning`
            field. If false, the model's reasoning will not be included in the response.

            This field is mutually exclusive with `reasoning_format`.
        logit_bias:
          type: object
          default: null
          nullable: true
          additionalProperties:
            type: integer
          description: |
            This is not yet supported by any of our models.
            Modify the likelihood of specified tokens appearing in the completion.
        logprobs:
          description: >
            This is not yet supported by any of our models.

            Whether to return log probabilities of the output tokens or not. If true, returns the log
            probabilities of each output token returned in the `content` of `message`.
          type: boolean
          default: false
          nullable: true
        top_logprobs:
          description: >
            This is not yet supported by any of our models.

            An integer between 0 and 20 specifying the number of most likely tokens to return at each token
            position, each with an associated log probability. `logprobs` must be set to `true` if this
            parameter is used.
          type: integer
          minimum: 0
          maximum: 20
          nullable: true
        max_tokens:
          description: >
            Deprecated in favor of `max_completion_tokens`.

            The maximum number of tokens that can be generated in the chat completion. The total length of
            input tokens and generated tokens is limited by the model's context length.
          type: integer
          nullable: true
          deprecated: true
        max_completion_tokens:
          description: >-
            The maximum number of tokens that can be generated in the chat completion. The total length of
            input tokens and generated tokens is limited by the model's context length.
          type: integer
          nullable: true
        'n':
          type: integer
          minimum: 1
          maximum: 1
          default: 1
          example: 1
          nullable: true
          description: >-
            How many chat completion choices to generate for each input message. Note that the current moment,
            only n=1 is supported. Other values will result in a 400 response.
        presence_penalty:
          type: number
          default: 0
          minimum: -2
          maximum: 2
          nullable: true
          description: >-
            This is not yet supported by any of our models. Number between -2.0 and 2.0. Positive values
            penalize new tokens based on whether they appear in the text so far, increasing the model's
            likelihood to talk about new topics.
        response_format:
          nullable: true
          description: >
            An object specifying the format that the model must output. Setting to `{ "type": "json_schema",
            "json_schema": {...} }` enables Structured Outputs which ensures the model will match your
            supplied JSON schema. `json_schema` response format is only available on [supported
            models](https://console.groq.com/docs/structured-outputs#supported-models). Setting to `{ "type":
            "json_object" }` enables the older JSON mode, which ensures the message the model generates is
            valid JSON. Using `json_schema` is preferred for models that support it.
          oneOf:
            - $ref: '#/components/schemas/ResponseFormatText'
            - $ref: '#/components/schemas/ResponseFormatJsonSchema'
            - $ref: '#/components/schemas/ResponseFormatJsonObject'
        seed:
          type: integer
          nullable: true
          description: >
            If specified, our system will make a best effort to sample deterministically, such that repeated
            requests with the same `seed` and parameters should return the same result.

            Determinism is not guaranteed, and you should refer to the `system_fingerprint` response parameter
            to monitor changes in the backend.
        service_tier:
          type: string
          nullable: true
          description: >
            The service tier to use for the request. Defaults to `on_demand`.

            - `auto` will automatically select the highest tier available within the rate limits of your
            organization.

            - `flex` uses the flex tier, which will succeed or fail quickly.
          enum:
            - auto
            - on_demand
            - flex
            - performance
            - null
        stop:
          description: >
            Up to 4 sequences where the API will stop generating further tokens. The returned text will not
            contain the stop sequence.
          default: null
          nullable: true
          oneOf:
            - type: string
              example: |+

              nullable: true
            - type: array
              minItems: 0
              maxItems: 4
              items:
                type: string
                example: '["\n"]'
        reasoning_effort:
          description: |
            qwen3 models support the following values
            Set to 'none' to disable reasoning.
            Set to 'default' or null to let Qwen reason.

            openai/gpt-oss-20b and openai/gpt-oss-120b support 'low', 'medium', or 'high'.
            'medium' is the default value.
          nullable: true
          default: null
          type: string
          enum:
            - none
            - default
            - low
            - medium
            - high
        reasoning_format:
          description: |
            Specifies how to output reasoning tokens
            This field is mutually exclusive with `include_reasoning`.
          default: null
          nullable: true
          type: string
          enum:
            - hidden
            - raw
            - parsed
        stream:
          description: >
            If set, partial message deltas will be sent. Tokens will be sent as data-only [server-sent
            events](https://developer.mozilla.org/en-US/docs/Web/API/Server-sent_events/Using_server-sent_events#Event_stream_format)
            as they become available, with the stream terminated by a `data: [DONE]` message. [Example
            code](/docs/text-chat#streaming-a-chat-completion).
          type: boolean
          nullable: true
          default: false
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 1
          example: 1
          nullable: true
          description: >-
            What sampling temperature to use, between 0 and 2. Higher values like 0.8 will make the output
            more random, while lower values like 0.2 will make it more focused and deterministic. We generally
            recommend altering this or top_p but not both.
        top_p:
          type: number
          minimum: 0
          maximum: 1
          default: 1
          example: 1
          nullable: true
          description: >-
            An alternative to sampling with temperature, called nucleus sampling, where the model considers
            the results of the tokens with top_p probability mass. So 0.1 means only the tokens comprising the
            top 10% probability mass are considered. We generally recommend altering this or temperature but
            not both.
        tools:
          type: array
          nullable: true
          maxItems: 128
          description: >
            A list of tools the model may call. Currently, only functions are supported as a tool. Use this to
            provide a list of functions the model may generate JSON inputs for. A max of 128 functions are
            supported.
          items:
            $ref: '#/components/schemas/ChatCompletionTool'
        tool_choice:
          $ref: '#/components/schemas/ChatCompletionToolChoiceOption'
        parallel_tool_calls:
          description: |
            Whether to enable parallel function calling during tool use.
          type: boolean
          nullable: true
          default: true
        user:
          type: string
          description: A unique identifier representing your end-user, which can help us monitor and detect abuse.
          nullable: true
        function_call:
          deprecated: true
          nullable: true
          description: >
            Deprecated in favor of `tool_choice`.


            Controls which (if any) function is called by the model.

            `none` means the model will not call a function and instead generates a message.

            `auto` means the model can pick between generating a message or calling a function.

            Specifying a particular function via `{"name": "my_function"}` forces the model to call that
            function.


            `none` is the default when no functions are present. `auto` is the default if functions are
            present.
          oneOf:
            - type: string
              description: >
                `none` means the model will not call a function and instead generates a message. `auto` means
                the model can pick between generating a message or calling a function.
              enum:
                - none
                - auto
                - required
            - $ref: '#/components/schemas/ChatCompletionFunctionCallOption'
        functions:
          deprecated: true
          nullable: true
          description: |
            Deprecated in favor of `tools`.

            A list of functions the model may generate JSON inputs for.
          type: array
          minItems: 0
          maxItems: 128
          items:
            $ref: '#/components/schemas/ChatCompletionFunctions'
        metadata:
          type: object
          nullable: true
          additionalProperties:
            type: string
          description: |
            This parameter is not currently supported.
        store:
          type: boolean
          nullable: true
          description: |
            This parameter is not currently supported.
        include_domains:
          type: array
          nullable: true
          deprecated: true
          description: |
            Deprecated: Use search_settings.include_domains instead.
            A list of domains to include in the search results when the model uses a web search tool.
          items:
            type: string
        exclude_domains:
          type: array
          nullable: true
          deprecated: true
          description: |
            Deprecated: Use search_settings.exclude_domains instead.
            A list of domains to exclude from the search results when the model uses a web search tool.
          items:
            type: string
        search_settings:
          type: object
          nullable: true
          description: |
            Settings for web search functionality when the model uses a web search tool.
          properties:
            include_domains:
              type: array
              nullable: true
              description: A list of domains to include in the search results.
              items:
                type: string
            exclude_domains:
              type: array
              nullable: true
              description: A list of domains to exclude from the search results.
              items:
                type: string
            include_images:
              type: boolean
              nullable: true
              description: Whether to include images in the search results.
            country:
              type: string
              nullable: true
              description: >-
                Name of country to prioritize search results from (e.g., "united states", "germany",
                "france").
        compound_custom:
          type: object
          nullable: true
          description: Custom configuration of models and tools for Compound.
          properties:
            models:
              type: object
              nullable: true
              properties:
                reasoning_model:
                  type: string
                  nullable: true
                  description: Custom model to use for reasoning.
                answering_model:
                  type: string
                  nullable: true
                  description: Custom model to use for answering.
            tools:
              type: object
              nullable: true
              description: Configuration options for tools available to Compound.
              properties:
                enabled_tools:
                  type: array
                  nullable: true
                  description: A list of tool names that are enabled for the request.
                  items:
                    type: string
                wolfram_settings:
                  type: object
                  nullable: true
                  description: Configuration for the Wolfram tool integration.
                  properties:
                    authorization:
                      type: string
                      nullable: true
                      description: API key used to authorize requests to Wolfram services.
        documents:
          type: array
          nullable: true
          description: >-
            A list of documents to provide context for the conversation. Each document contains text that can
            be referenced by the model.
          items:
            $ref: '#/components/schemas/ChatCompletionDocument'
        citation_options:
          type: string
          enum:
            - enabled
            - disabled
          nullable: true
          default: enabled
          description: >-
            Whether to enable citations in the response. When enabled, the model will include citations for
            information retrieved from provided documents or web searches.
      required:
        - model
        - messages
    ResponseFormatJsonObject:
      type: object
      title: JSON object
      description: >
        JSON object response format. An older method of generating JSON responses. Using `json_schema` is
        recommended for models that support it. Note that the model will not generate JSON without a system or
        user message instructing it to do so.
      properties:
        type:
