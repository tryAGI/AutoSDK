          content:
            text/plain:
              schema:
                type: string
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTranslationResponseJson'
      x-groq-metadata:
        returns: Returns an audio translation object.
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.groq.com/openai/v1/audio/translations \
                  -H "Authorization: Bearer $GROQ_API_KEY" \
                  -H "Content-Type: multipart/form-data" \
                  -F file="@./sample_audio.m4a" \
                  -F model="whisper-large-v3"
              py: |
                # Default
                import os
                from groq import Groq

                client = Groq()
                filename = os.path.dirname(__file__) + "/sample_audio.m4a"

                with open(filename, "rb") as file:
                    translation = client.audio.translations.create(
                      file=(filename, file.read()),
                      model="whisper-large-v3",
                      prompt="Specify context or spelling",  # Optional
                      response_format="json",  # Optional
                      temperature=0.0  # Optional
                    )
                    print(translation.text)
              js: |
                // Default
                import fs from "fs";
                import Groq from "groq-sdk";

                const groq = new Groq();
                async function main() {
                  const translation = await groq.audio.translations.create({
                    file: fs.createReadStream("sample_audio.m4a"),
                    model: "whisper-large-v3",
                    prompt: "Specify context or spelling", // Optional
                    response_format: "json", // Optional
                    temperature: 0.0, // Optional
                  });
                  console.log(translation.text);
                }
                main();
            response: |
              {
                "text": "Your translated text appears here...",
                "x_groq": {
                  "id": "req_unique_id"
                }
              }
  /openai/v1/batches:
    post:
      summary: Creates and executes a batch from an uploaded file of requests. [Learn more](/docs/batch).
      operationId: createBatch
      tags:
        - Batch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - input_file_id
                - endpoint
                - completion_window
              properties:
                input_file_id:
                  type: string
                  description: >
                    The ID of an uploaded file that contains requests for the new batch.


                    See [upload file](/docs/api-reference#files-upload) for how to upload a file.


                    Your input file must be formatted as a [JSONL file](/docs/batch), and must be uploaded
                    with the purpose `batch`. The file can be up to 100 MB in size.
                endpoint:
                  type: string
                  enum:
                    - /v1/chat/completions
                  description: >-
                    The endpoint to be used for all requests in the batch. Currently `/v1/chat/completions` is
                    supported.
                completion_window:
                  type: string
                  description: >-
                    The time frame within which the batch should be processed. Durations from `24h` to `7d`
                    are supported.
                metadata:
                  type: object
                  additionalProperties:
                    type: string
                  description: Optional custom metadata for the batch.
                  nullable: true
      responses:
        '200':
          description: Batch created successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Batch'
      x-groq-metadata:
        returns: A created batch object.
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.groq.com/openai/v1/batches \
                  -H "Authorization: Bearer $GROQ_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "input_file_id": "file_01jh6x76wtemjr74t1fh0faj5t",
                    "endpoint": "/v1/chat/completions",
                    "completion_window": "24h"
                  }'
              py: |
                import os
                from groq import Groq

                client = Groq(
                    api_key=os.environ.get("GROQ_API_KEY"),  # This is the default and can be omitted
                )
                batch = client.batches.create(
                    completion_window="24h",
                    endpoint="/v1/chat/completions",
                    input_file_id="file_01jh6x76wtemjr74t1fh0faj5t",
                )
                print(batch.id)
              js: |
                import Groq from 'groq-sdk';

                const client = new Groq({
                  apiKey: process.env['GROQ_API_KEY'], // This is the default and can be omitted
                });

                async function main() {
                  const batch = await client.batches.create({
                    completion_window: "24h",
                    endpoint: "/v1/chat/completions",
                    input_file_id: "file_01jh6x76wtemjr74t1fh0faj5t",
                  });
                  console.log(batch.id);
                }

                main();
            response: |
              {
                "id": "batch_01jh6xa7reempvjyh6n3yst2zw",
                "object": "batch",
                "endpoint": "/v1/chat/completions",
                "errors": null,
                "input_file_id": "file_01jh6x76wtemjr74t1fh0faj5t",
                "completion_window": "24h",
                "status": "validating",
                "output_file_id": null,
                "error_file_id": null,
                "finalizing_at": null,
                "failed_at": null,
                "expired_at": null,
                "cancelled_at": null,
                "request_counts": {
                  "total": 0,
                  "completed": 0,
                  "failed": 0
                },
                "metadata": null,
                "created_at": 1736472600,
                "expires_at": 1736559000,
                "cancelling_at": null,
                "completed_at": null,
                "in_progress_at": null
              }
    get:
      operationId: listBatches
      tags:
        - Batch
      summary: List your organization's batches.
      responses:
        '200':
          description: Batch listed successfully.
          content:
            application/json:
