                    url:
                      type: string
                      description: The URL of the search result
                    content:
                      type: string
                      description: The content of the search result
                    score:
                      type: number
                      format: float
                      description: The relevance score of the search result
              images:
                type: array
                description: List of image URLs returned by the search
                items:
                  type: string
          code_results:
            type: array
            items:
              $ref: '#/components/schemas/CodeExecutionResult'
            description: Array of code execution results
          browser_results:
            type: array
            items:
              $ref: '#/components/schemas/BrowserResult'
            description: Array of browser results
        required:
          - index
          - type
          - arguments
    ChatCompletionStreamResponseDelta:
      type: object
      description: A chat completion delta generated by streamed model responses.
      properties:
        content:
          type: string
          description: The contents of the chunk message.
          nullable: true
        reasoning:
          type: string
          description: >-
            The model's reasoning for a response. Only available for [models that support
