        role:
          type: string
          enum:
            - assistant
          description: The role of the author of this message.
        function_call:
          type: object
          deprecated: true
          description: >-
            Deprecated and replaced by `tool_calls`. The name and arguments of a function that should be
            called, as generated by the model.
          properties:
            arguments:
              type: string
              description: >-
                The arguments to call the function with, as generated by the model in JSON format. Note that
                the model does not always generate valid JSON, and may hallucinate parameters not defined by
                your function schema. Validate the arguments in your code before calling your function.
            name:
              type: string
              description: The name of the function to call.
          required:
            - name
            - arguments
        annotations:
          type: array
          description: A list of annotations providing citations and references for the content in the message.
          items:
            $ref: '#/components/schemas/Annotation'
      required:
        - role
        - content
    ChatCompletionMessageExecutedTools:
      type: array
      description: A list of tools that were executed during the chat completion for compound AI systems.
      items:
        type: object
        properties:
          index:
            type: integer
            description: The index of the executed tool.
          type:
            type: string
            description: The type of tool that was executed.
          arguments:
            type: string
            description: The arguments passed to the tool in JSON format.
          output:
            type: string
