      tags:
        - Files
      summary: >
        Upload a file that can be used across various endpoints.


        The Batch API only supports `.jsonl` files up to 100 MB in size. The input also has a specific
        required [format](/docs/batch).


        Please contact us if you need to increase these storage limits.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/File'
      x-groq-metadata:
        returns: The uploaded File object.
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.groq.com/openai/v1/files \
                  -H "Authorization: Bearer $GROQ_API_KEY" \
                  -F purpose="batch" \
                  -F "file=@batch_file.jsonl"
              py: |
                import os
                import requests # pip install requests first!

                def upload_file_to_groq(api_key, file_path):
                    url = "https://api.groq.com/openai/v1/files"

                    headers = {
                        "Authorization": f"Bearer {api_key}"
                    }

                    # Prepare the file and form data
                    files = {
                        "file": ("batch_file.jsonl", open(file_path, "rb"))
                    }

                    data = {
                        "purpose": "batch"
                    }

                    # Make the POST request
                    response = requests.post(url, headers=headers, files=files, data=data)

                    return response.json()

                # Usage example
                api_key = os.environ.get("GROQ_API_KEY")
                file_path = "batch_file.jsonl"  # Path to your JSONL file

                try:
                    result = upload_file_to_groq(api_key, file_path)
                    print(result)
                except Exception as e:
                    print(f"Error: {e}")
              js: >
                import Groq from 'groq-sdk';


                const client = new Groq({
                  apiKey: process.env['GROQ_API_KEY'], // This is the default and can be omitted
                });


                const fileContent = '{"custom_id": "request-1", "method": "POST", "url":
                "/v1/chat/completions", "body": {"model": "llama-3.1-8b-instant", "messages": [{"role":
                "user", "content": "Explain the importance of fast language models"}]}}\n';


                async function main() {
                  const blob = new Blob([fileContent]);
                  const file = new File([blob], 'batch.jsonl');

                  const createdFile = await client.files.create({ file: file, purpose: 'batch' });
                  console.log(createdFile.id);
                }


                main();
            response: |
              {
                "id": "file_01jh6x76wtemjr74t1fh0faj5t",
                "object": "file",
                "bytes": 966,
                "created_at": 1736472501,
                "filename": "batch_file.jsonl",
                "purpose": "batch"
              }
