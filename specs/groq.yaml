openapi: 3.0.1
info:
  title: GroqCloud API
  description: Specification of the Groq cloud API
  termsOfService: https://groq.com/terms-of-use/
  contact:
    name: Groq Support
    email: support@groq.com
  version: '2.1'
servers:
  - url: https://api.groq.com
paths:
  /openai/v1/audio/speech:
    post:
      operationId: createSpeech
      tags:
        - Audio
      summary: Generates audio from the input text.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSpeechRequest'
      responses:
        '200':
          description: OK
          headers:
            Transfer-Encoding:
              schema:
                type: string
              description: chunked
          content:
            audio/wav:
              schema:
                type: string
                format: binary
      x-groq-metadata:
        returns: Returns an audio file in `wav` format.
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.groq.com/openai/v1/audio/speech \
                  -H "Authorization: Bearer $GROQ_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "model": "playai-tts",
                    "input": "I love building and shipping new features for our users!",
                    "voice": "Fritz-PlayAI",
                    "response_format": "wav"
                  }'
              py: |
                import os
                from groq import Groq

                client = Groq(api_key=os.environ.get("GROQ_API_KEY"))

                speech_file_path = "speech.wav"
                model = "playai-tts"
                voice = "Fritz-PlayAI"
                text = "I love building and shipping new features for our users!"
                response_format = "wav"

                response = client.audio.speech.create(
                    model=model,
                    voice=voice,
                    input=text,
                    response_format=response_format
                )

                response.write_to_file(speech_file_path)
              js: |
                import fs from "fs";
                import path from "path";
                import Groq from 'groq-sdk';

                const groq = new Groq({
                  apiKey: process.env.GROQ_API_KEY
                });

                const speechFilePath = "speech.wav";
                const model = "playai-tts";
                const voice = "Fritz-PlayAI";
                const text = "I love building and shipping new features for our users!";
                const responseFormat = "wav";

                async function main() {
                  const response = await groq.audio.speech.create({
                    model: model,
                    voice: voice,
                    input: text,
                    response_format: responseFormat
                  });

                  const buffer = Buffer.from(await response.arrayBuffer());
                  await fs.promises.writeFile(speechFilePath, buffer);
                }

                main();
  /openai/v1/audio/transcriptions:
    post:
      operationId: createTranscription
      tags:
        - Audio
      summary: Transcribes audio into the input language.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CreateTranscriptionRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateTranscriptionResponseJson'
      x-groq-metadata:
        returns: Returns an audio transcription object.
        examples:
          - title: Default
            request:
              curl: |
                curl https://api.groq.com/openai/v1/audio/transcriptions \
                  -H "Authorization: Bearer $GROQ_API_KEY" \
                  -H "Content-Type: multipart/form-data" \
                  -F file="@./sample_audio.m4a" \
                  -F model="whisper-large-v3"
              py: |
                import os
                from groq import Groq

                client = Groq()
                filename = os.path.dirname(__file__) + "/sample_audio.m4a"

                with open(filename, "rb") as file:
                    transcription = client.audio.transcriptions.create(
                      file=(filename, file.read()),
                      model="whisper-large-v3",
                      prompt="Specify context or spelling",  # Optional
                      response_format="json",  # Optional
                      language="en",  # Optional
                      temperature=0.0  # Optional
                    )
                    print(transcription.text)
              js: |
                import fs from "fs";
                import Groq from "groq-sdk";

                const groq = new Groq();
                async function main() {
                  const transcription = await groq.audio.transcriptions.create({
                    file: fs.createReadStream("sample_audio.m4a"),
                    model: "whisper-large-v3",
                    prompt: "Specify context or spelling", // Optional
                    response_format: "json", // Optional
                    language: "en", // Optional
                    temperature: 0.0, // Optional
                  });
                  console.log(transcription.text);
                }
                main();
            response: |
              {
                "text": "Your transcribed text appears here...",
                "x_groq": {
                  "id": "req_unique_id"
                }
              }
  /openai/v1/audio/translations:
