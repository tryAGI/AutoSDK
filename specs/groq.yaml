        strict:
          type: boolean
          default: false
          description: >
            Whether to enable strict schema adherence when generating the output. If set to true, the model
            will always follow the exact schema defined in the `schema` field. Only a subset of JSON Schema is
            supported when `strict` is `true`.
      required:
        - name
    ChatCompletionToolChoiceOption:
      nullable: true
      description: >
        Controls which (if any) tool is called by the model.

        `none` means the model will not call any tool and instead generates a message.

        `auto` means the model can pick between generating a message or calling one or more tools.

        `required` means the model must call one or more tools.

        Specifying a particular tool via `{"type": "function", "function": {"name": "my_function"}}` forces
        the model to call that tool.


        `none` is the default when no tools are present. `auto` is the default if tools are present.
      oneOf:
        - type: string
          description: >
            `none` means the model will not call any tool and instead generates a message. `auto` means the
            model can pick between generating a message or calling one or more tools.
          enum:
            - none
            - auto
            - required
        - $ref: '#/components/schemas/ChatCompletionNamedToolChoice'
      x-groq-meta:
        validator: ChatCompletionToolChoiceOption
    ChatCompletionNamedToolChoice:
      type: object
      description: Specifies a tool the model should use. Use to force the model to call a specific function.
      properties:
        type:
