    post:
      operationId: createReranking
      tags:
        - Reranking
      summary: Reranks documents based on their relevance to a query.
      description: |
        Given a query and a list of documents, returns the documents ranked by their relevance to the query.
        The documents are scored and sorted in descending order of relevance.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RerankingRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RerankingResponse'
      x-groq-metadata:
        returns: |
          A list of documents sorted by relevance score in descending order. 
          Scores range from 0.0 to 1.0, where higher scores indicate greater relevance to the query.
        examples:
          - title: Basic Reranking
            request:
              curl: |
                curl https://api.groq.com/openai/v1/reranking \
                  -H "Authorization: Bearer $GROQ_API_KEY" \
                  -H "Content-Type: application/json" \
                  -d '{
                    "model": "qwen3-reranker-4b",
                    "query": "artificial intelligence",
                    "docs": [
                      "Machine learning is a subset of AI",
                      "The weather is nice today",
                      "Deep learning uses neural networks"
                    ]
                  }'
              py: |
                import os
                from groq import Groq

                client = Groq(api_key=os.environ.get("GROQ_API_KEY"))

                reranking = client.reranking.create(
                    model="qwen3-reranker-4b",
                    query="artificial intelligence",
                    docs=[
                        "Machine learning is a subset of AI",
                        "The weather is nice today", 
                        "Deep learning uses neural networks"
                    ]
                )
                print(reranking.results)
              js: |
                import Groq from 'groq-sdk';

                const client = new Groq({
                  apiKey: process.env['GROQ_API_KEY'],
                });

                async function main() {
                  const reranking = await client.reranking.create({
                    model: 'qwen3-reranker-4b',
                    query: 'artificial intelligence',
                    docs: [
                      'Machine learning is a subset of AI',
                      'The weather is nice today',
                      'Deep learning uses neural networks'
                    ]
                  });
                  console.log(reranking.results);
                }
                main();
            response: |
              {
                "results": [
                  {
                    "doc": "Machine learning is a subset of AI",
                    "score": 0.92
                  },
                  {
                    "doc": "Deep learning uses neural networks", 
                    "score": 0.87
                  },
                  {
                    "doc": "The weather is nice today",
                    "score": 0.23
                  }
                ]
              }
          - title: Reranking with Custom Instruction
            request:
              json: |
                {
                  "model": "qwen3-reranker-4b",
                  "query": "climate change effects",
                  "docs": [
                    "Global warming causes sea level rise",
                    "Electric cars reduce emissions",
                    "Renewable energy is growing fast"
                  ],
                  "instruction": "Find documents specifically about environmental impacts"
                }
            response: |
              {
                "results": [
                  {
                    "doc": "Global warming causes sea level rise",
                    "score": 0.95
                  },
                  {
                    "doc": "Electric cars reduce emissions",
                    "score": 0.78
                  },
                  {
                    "doc": "Renewable energy is growing fast",
                    "score": 0.65
                  }
                ]
