{
  "openapi": "3.1.0",
  "info": {
    "title": "API Reference",
    "version": "1.0.0"
  },
  "paths": {
    "/responses": {
      "post": {
        "operationId": "responses",
        "summary": "Responses",
        "description": "Generate responses while also allowing for the utilization of various tools.",
        "tags": [
          ""
        ],
        "responses": {
          "200": {
            "description": "Successful response.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/responses_Response_200"
                }
              }
            }
          },
          "400": {
            "description": "General error response.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ResponsesRequestBadRequestError"
                }
              }
            }
          },
          "403": {
            "description": "Failed auth response.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ResponsesRequestForbiddenError"
                }
              }
            }
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "model": {
                    "type": "string",
                    "description": "The AI model to use for generating responses."
                  },
                  "input": {
                    "$ref": "#/components/schemas/ResponsesPostRequestBodyContentApplicationJsonSchemaInput"
                  },
                  "instructions": {
                    "type": "string",
                    "description": "A system (or developer) message inserted into the model's context."
                  },
                  "max_output_tokens": {
                    "type": "integer",
                    "description": "The maximum number of tokens in the generated output."
                  },
                  "max_tool_calls": {
                    "type": "integer",
                    "description": "The maximum amount of tool calls the model is able to do."
                  },
                  "parallel_tool_calls": {
                    "type": "boolean",
                    "description": "Whether to enable parallel function calling during tool use."
                  },
                  "reasoning": {
                    "$ref": "#/components/schemas/ResponsesPostRequestBodyContentApplicationJsonSchemaReasoning",
                    "description": "Constrains effort on reasoning for reasoning models."
                  },
                  "stream": {
                    "type": "boolean",
                    "description": "Whether to stream back the model response. Not currently supported."
                  },
                  "stream_options": {
                    "$ref": "#/components/schemas/ResponsesPostRequestBodyContentApplicationJsonSchemaStreamOptions",
                    "description": "Extra parameters used when streaming the response."
                  },
                  "temperature": {
                    "type": "number",
                    "format": "double",
                    "description": "The temperature parameter for controlling randomness in completions. Supports a range of 0.0-2.0."
                  },
                  "tool_choice": {
                    "$ref": "#/components/schemas/ResponsesPostRequestBodyContentApplicationJsonSchemaToolChoice"
                  },
                  "tools": {
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/ResponsesPostRequestBodyContentApplicationJsonSchemaToolsItems"
                    },
                    "description": "The content of the tool call."
                  },
                  "top_p": {
                    "type": "number",
                    "format": "double",
                    "description": "The diversity of the generated text based on nucleus sampling. Supports a range of 0.0-1.0."
                  },
                  "safeguards": {
                    "$ref": "#/components/schemas/ResponsesPostRequestBodyContentApplicationJsonSchemaSafeguards",
                    "description": "Safeguards to run on the request."
                  }
                },
                "required": [
                  "model",
                  "input"
                ]
              }
            }
          }
        }
      }
    },
    "/chat/completions": {
      "post": {
        "operationId": "chat-completions",
        "summary": "Chat Completions",
        "description": "Generate chat completions based on a conversation history.",
        "tags": [
          ""
        ],
        "responses": {
          "200": {
            "description": "Successful response.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/chatCompletions_Response_200"
                }
              }
            }
          },
          "400": {
            "description": "General error response.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ChatCompletionsRequestBadRequestError"
                }
              }
            }
          },
          "403": {
            "description": "Failed auth response.",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ChatCompletionsRequestForbiddenError"
                }
              }
            }
          }
        },
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "model": {
                    "type": "string",
                    "description": "The chat model to use for generating completions."
                  },
                  "messages": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaMessages"
                  },
                  "frequency_penalty": {
                    "type": "number",
                    "format": "double",
                    "description": "A value between -2.0 and 2.0, with positive values increasingly penalizing new tokens based on their frequency so far in order to decrease further occurrences."
                  },
                  "logit_bias": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaLogitBias",
                    "description": "Modifies the likelihood of specified tokens appearing in a response."
                  },
                  "max_completion_tokens": {
                    "type": "integer",
                    "description": "The maximum number of tokens in the generated completion."
                  },
                  "parallel_tool_calls": {
                    "type": "boolean",
                    "description": "Whether to enable parallel function calling during tool use."
                  },
                  "presence_penalty": {
                    "type": "number",
                    "format": "double",
                    "description": "A value between -2.0 and 2.0, with positive values causing a flat reduction of new tokens based on their existing presence so far in order to decrease further occurrences."
                  },
                  "reasoning_effort": {
                    "type": "string",
                    "description": "Constrains effort on reasoning for reasoning models. Currently supported values are `low`, `medium`, and `high`. Reducing reasoning effort can result in faster responses and fewer tokens used on reasoning in a response. Only supported by reasoning models."
                  },
                  "stop": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaStop"
                  },
                  "stream": {
                    "type": "boolean",
                    "description": "Whether to stream back the model response."
                  },
                  "stream_options": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaStreamOptions",
                    "description": "Extra parameters used when streaming the response."
                  },
                  "temperature": {
                    "type": "number",
                    "format": "double",
                    "description": "The temperature parameter for controlling randomness in completions. Supports a range of 0.0-2.0."
                  },
                  "tool_choice": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaToolChoice"
                  },
                  "tools": {
                    "type": "array",
                    "items": {
                      "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaToolsItems"
                    },
                    "description": "The content of the tool call."
                  },
                  "top_p": {
                    "type": "number",
                    "format": "double",
                    "description": "The diversity of the generated text based on nucleus sampling. Supports a range of 0.0-1.0."
                  },
                  "top_k": {
                    "type": "integer",
                    "description": "The diversity of the generated text based on top-k sampling."
                  },
                  "output": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaOutput",
                    "description": "Options to affect the output of the response."
                  },
                  "input": {
                    "$ref": "#/components/schemas/ChatCompletionsPostRequestBodyContentApplicationJsonSchemaInput",
                    "description": "Options to affect the input of the request."
                  },
                  "max_tokens": {
                    "type": "integer",
                    "description": "Deprecated. Please use max_completion_tokens."
                  }
                },
                "required": [
                  "model",
                  "messages"
                ]
              }
            }
          }
        }
      }
    },
